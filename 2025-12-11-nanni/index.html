For our 2020 paper …

![first page of the "Neural Reading" paper](images/neural-reading.png)<!-- .element width="550px" style="border: 1px solid black; padding: 2px;" -->

… we took a quick stroll through the <br />pioneering era of computer-generated poetry

--

### Takeaways

<br />

- the history of computer poetry began long before the boom of today’s AI chatbots and »write a poem in the style of …«
- the first computers appeared in the early 1940s (Konrad Zuse’s Z3 and the IBM/Harvard Mark I designed by Howard Aiken)
- by the late 1950s, programmers and artists began experimenting with text generation

--

### Opus Primum

<br />

- in 1959, German mathematician Theo Lutz programmed a Zuse Z22 computer to randomly combine phrases from the 16 chapters of Kafka’s unfinished novel »The Castle«, calling the resulting texts »stochastic«:

<p align="left"><br />
<!-- .element: style="font-size:0.8em; padding-left:10%;" -->
NICHT JEDER BLICK IST NAH. KEIN DORF IST SPAET.<br />
EIN SCHLOSS IST FREI UND JEDER BAUER IST FERN.<br />
JEDER FREMDE IST FERN. EIN TAG IST SPAET.<br />
JEDES HAUS IST DUNKEL. EIN AUGE IST TIEF.<br />
NICHT JEDES SCHLOSS IST ALT. JEDER TAG IST ALT<br />
NICHT JEDER GAST IST WUETEND. EINE KIRCHE IST SCHMAL<br />
KEIN HAUS IST OFFEN UND NICHT JEDE KIRCHE IST STILL.<br />
NICHT JEDES AUGE IST WUETEND. KEIN BLICK IST NEU.
</p>

--

### Gysin & Gunzenhäuser

<br />

- in 1960, Brion Gysin used the computer to generate all permutations of the phrase »I AM THAT I AM«
- in 1961, Rul Gunzenhäuser published a computer-generated Christmas poem:

<p align="left">
<!-- .element: style="font-size:0.9em; padding-left:15%;" -->Der Schnee ist kalt<br />
und jeder Friede ist tief<br />
und kein Christbaum ist leise<br />
oder jede Kerze ist weiss<br />
oder ein Friede ist kalt<br />
oder nicht jede Kerze ist rein<br />
und ein Engel ist rein<br />
und jeder Friede ist still<br />
oder jeder Friede ist weiss<br />
oder das Kind ist still<br />
ein Engel ist überall
</p>

--

Also in 1961,

Nanni Balestrini created the poem »Tape Mark I«
<!-- .element: class="fragment" -->

on the IBM 7070 using the Autocoder assembler.
<!-- .element: class="fragment" -->

--

![Tape Mark I, page 151](images/tape-mark-i-page-151.jpg)<!-- .element width="450px" style="border: 1px solid black; padding: 2px;" -->

Source: Almanacco Letterario Bompiani 1962, ed. by Sergio Morando. Milan 1961, p. 151. ([PDF](https://p-dpa.net/download/almanacco-letterario-bompiani_1962.pdf#page=69))
<!-- .element: style="font-size:0.6em;" -->

--

### Three sources

<br />

- Michihiko Hachiya: »Hiroshima Diary« (1955)
- Paul Goldwin: »The Mystery of the Elevator« (?)
- Laozi: »Tao Te Ching« (4th century BCE)

--

![three source texts](images/three-sources.png)<!-- .element width="350px" style="border: 1px solid black; padding: 2px;" -->

--

### Instructions

<br />

1. Make combinations of ten elements out of the given fifteen, without permutations or repetitions.
2. Construct chains of elements taking into account the head-codes and tail-codes.
3. Avoid juxtaposing elements drawn from the same extract.
4. Subdivide the chains of ten elements into six lines of four metrical units each.

<br /><br />Cf. Alessandro Mazzei, Andrea Valle: Combinatorics vs Grammar: Archeology of Computational Poetry in Tape Mark I. In: Proceedings of the INLG 2016 Workshop on Computational Creativity in Natural Language Generation. Association for Computational Linguistics, pp. 61–70. ([doi:10.18653/v1/W16-5509](https://doi.org/10.18653/v1/W16-5509))
<!-- .element: style="font-size:0.6em;" -->

--

### Output and curation

<br />

- the program required around six minutes to generate each stanza
- the final output was printed onto dozens of meters of continuous paper at a speed of around 600 lines per minute
- Balestrini examined the entire sequence and selected a fragment of six consecutive stanzas that he found interesting

<br /><br />Cf. Emiliano Russo, Gabriele Zaverio, Vittorio Bellanich: TAPE MARK 1 von <br />Nanni Balestrini: Forschung und historische Rekonstruktion. June 2017. ([zkm.de](https://zkm.de/de/tape-mark-1-von-nanni-balestrini-forschung-und-historische-rekonstruktion))
<!-- .element: style="font-size:0.6em;" -->

### »Chi diavolo è Paul Goldwin?«

<br />

- Theories by [Alessandro Giammei (2018)](https://www.giammei.com/s/Il_contenuto_della_poesia_informale_Nell.pdf):
  1. un’invenzione di Balestrini;
  2. un minore assoluto;
  3. uno scrittore d’occasione;
  4. uno pseudonimo.

<br />»Non sappiamo niente su Paul Goldwin!«
<!-- .element: class="fragment" -->
