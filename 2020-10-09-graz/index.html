# Kapitel 2.

### Korpusarbeit

--

### **DraCor**

<br />

- nachhaltige Forschungsprojekte benötigen (und erzeugen) dedizierte Infrastruktur
- DraCor: *Drama Corpora*-Portal (https://dracor.org/)
- begonnen mit zwei Hauskorpora:
  - German Drama Corpus, GerDraCor (1730er–1940er)
  - Russian Drama Corpus, RusDraCor (1740er–1940er)

--

### Voraussetzung: Kodierungsstandard TEI

<br />

```xml
<sp who="#gretchen">
  <speaker>MARGARETE.</speaker>
  <lg>
    <l>Nun sag, wie hast du’s mit der Religion?</l>
    <l>Du bist ein herzlich guter Mann,</l>
    <l>Allein ich glaub’, du hältst nicht viel davon.</l>
  </lg>
</sp>
<sp who="#faust">
  <speaker>FAUST.</speaker>
  <lg>
    <l>Laß das, mein Kind! Du fühlst, ich bin dir gut;</l>
    <l>Für meine Lieben ließ’ ich Leib und Blut,</l>
    <l>Will niemand sein Gefühl und seine Kirche rauben.</l>
  </lg>
</sp>
```

<br />

<small>Dialog aus Goethes »Faust I« (1808) in TEI (Text Encoding Initiative). Momentan <br />sind im Standard 582 verschiedene Elemente definiert ([Stand August 2020](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).</small>

### GerDraCor

- Übernahme von 465 Stücken aus dem TextGrid Repository
- Korrekturen und Anreicherungen 2017–2020:
  - Sammlung aller ```<speaker>```-IDs in ```<particDesc>```
  - Genderinfo zu allen Figuren (momentan 12.162)
  - persönliche Beziehungen der Figuren untereinander (Familien- und Liebesverhältnisse, dienstliche Abhängigkeiten) – Beitrag Stuttgarter Kolleg*innen ([Nathalie Wiedmer et al.](https://quadrama.github.io/publications/Wiedmer2020aa))
  - Wikidata-IDs zu Autor*innen und Stücken (Linked Open Data!)
- mittlerweile 505 Stücke (Ergänzungen aus Wikisource, Gutenberg-DE, Google Books, …)

## APIs in den Geisteswissenschaften

<br /><br />
<small>API: Application Programming Interface (Anwendungsschnittstelle)<br /><br />

--

### Was ist eine API?

<br />

- standardisierter Austausch von Informationen zwischen einer Anwendung und einzelnen Programmteilen
- modularisierte, vereinfachte Programmierung
- Bereitstellung spezifischer Funktionen, die vom Rest der Applikation klar getrennt sind
- Übergabe von Daten erfolgt strukturiert nach einer definierten Syntax
- speziell: REST API (für Webservices)

--

### Einfache Visualisierung von Strukturdaten
#### Anzahl von Figuren pro Stück in chronologischer Folge (1/2)

<br />

```R
library(data.table)
library(ggplot2)
gerdracor <- fread("https://dracor.org/api/corpora/ger/metadata.csv")
ggplot(gerdracor[], aes(x = yearNormalized, y = numOfSpeakers)) + geom_point()
```

<br />

<small>Beispiel für einfaches R-Skript, das die Daten über die API bezieht.</small>

# Kapitel 4.

## Programmable Corpora

--

#### Zum Begriff:

<small>Frank Fischer, Ingo Börner, Mathias Göbel, Angelika Hechtl, Christopher Kittel, Carsten Milling, Peer Trilcke: **[Programmable Corpora: Introducing DraCor, an Infrastructure for the Research on European Drama.](https://dev.clariah.nl/files/dh2019/boa/0268.html)** <br />Proceedings of DH2019: »Complexities«, Utrecht.</small>

<br />

- Korpora als vergleichbare Objekte, die selbst Funktionen anbieten und mit anderen Datenquellen verbunden sind (via LOD)
- [FAIR-Prinzipien](https://www.go-fair.org/fair-principles/)
- Programmable Corpora erschöpfen sich aber nicht in der angebotenen API, Andockbarkeit auf allen Ebenen gegeben (TEI, API, R, Python, LOD, …)

### Zusammenfassung

<br />allgemein:
- Konzept der **Programmierbaren Korpora** für Forschung und Lehre
- forschungsnahe DH-Infrastruktur, die ein eigenes Ökosystem schafft
- Schnittstelle zwischen analoger und digitaler Philologie

<br>speziell:
- **dracor.org**: Forschungsinfrastruktur zum europäischen Drama:
  - verlässliche, erweiterbare Korpora in mehreren Sprachen, gepaart mit hochfunktionalen Schnittstellen (→&nbsp;komparatistische Ansätze)
  - Open-Source-Projekt: lurken, forken, pull requests
