### A Dialogue in TEI Format

<br />

```xml
<sp who="#margarita">
  <speaker>Маргарита</speaker>
  <lg>
    <l>Скажи ты мне прямей:</l>
    <l>Как дело обстоит с религией твоей?</l>
    <l>Ты славный, добрый человек, но к ней</l>
    <l>Относишься как будто беззаботно.</l>
  </lg>
</sp>
<sp who="#faust">
  <speaker>Фауст</speaker>
  <lg>
    <l>Оставь, дитя! Мою узнала ты любовь;</l>
    <l>За близких сердцу рад свою пролить я кровь;</l>
    <l>Не против веры я, кому в ней есть отрада.</l>
  </lg>
</sp>
```

<br />

<small>Dialogue from Goethe’s »Faust, Part One« (1808, [transl. by N. A. Kholodkovsky](https://ru.wikisource.org/wiki/Фауст_(Гёте;_Холодковский)/Часть_первая/Сцена_16._Сад_Марты)) in TEI. <br />To date, the standard defines 589 elements ([last revision in April 2021](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).</small>
