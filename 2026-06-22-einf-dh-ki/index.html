--

### Künstliche Intelligenz (Artificial Intelligence)

<br />

- ein Forschungszweig/Teilgebiet der Informatik
- Automatisierung von ›intelligentem‹ Verhalten
- nicht festgelegt, was ›intelligent‹ bedeutet
- eine Grundlage für KI ist das maschinelle Lernen

--

### Maschinelles Lernen (Machine Learning)

<br />

- Generierung von Wissen aus Erfahrungswerten
- Lernalgorithmen entwickeln anhand von (vielen) Beispielen ein komplexes Modell
- dieses Modell kann anschließend auf neue, ähnliche Daten angewendet werden
- manuelle Wissenseingabe nicht nötig
- Beispiel aus dem Alltag: die Empfehlungs-Algorithmen von Konsum- und Entertainment-Plattformen

--

### Tiefes Lernen (Deep Learning)

<br />

- maschinelles Lernen in künstlichen neuronalen Netzen
- mehrere Schichten, gebildet aus einer Vielzahl künstlicher Neuronen
- populäre Anwendungen in der Sprach-, Bild- und Videoverarbeitung
- erfordert viel Rechenkapazität (oft auf mehrere Grafikkarten verteilt)

--

### Künstliche neuronale Netze <br />(Artificial Neural Networks)

<br />

- lose inspiriert von natürlichen neuronalen Netzen
- keine biologisch realistische Simulation des Gehirns
- mathematische Modelle, die Eingaben schichtweise in Ausgaben transformieren
- viele – in Software realisierte – Schichten von Knoten (künstliche Neuronen)
- anhand von Beispielen verändert ein Lernalgorithmus die Gewichte bzw. Zahlenwerte an den Verbindungen zwischen den Knoten, bis die Ergebnisse für die Aufgabe gut genug sind
- Architektur, Zahl der Schichten/Knoten und Trainingsdaten beeinflussen, welche Aufgaben ein Modell gut lösen kann

--

<!-- .slide: class="list06" -->

![caption](images/Deep-Learning-KI.jpg)<!-- .element: style="height:300px;" -->

- jedes Neuron (rote Kreise) stellt eine Recheneinheit dar, die einen numerischen Wert speichert und verarbeitet
- die Neuronen werden schichtweise zusammengeschaltet, die Kanten zwischen ihnen sind mit Gewichten versehen, die steuern, wie stark die Ausgaben eines Neurons die Eingabe des nächsten beeinflussen (beim Training lernt das Netz die Gewichte)
- jedes Neuron der ersten Schicht erhält seine Eingabe direkt vom Eingang des neuronalen Netzes und berechnet mit diesen Werten seine Ausgabe
- die Neuronen der nächsten Schicht (rechts davon) bekommen als Eingabe die Ausgaben der Neuronenaktivitäten der Schicht davor
- d.&nbsp;h., Informationen werden im neuronalen Netz schichtweise verarbeitet, fließen von links nach rechts bis zum Ausgang des neuronalen Netzes (Ausgabe-Neuronen)
- mehr Schichten ermöglichen komplexere Repräsentationen, führen aber nicht automatisch zu besseren Ergebnissen

--

### Klassisches Machine Learning <br />vs. Deep Learning

<br />

- klassisches Machine Learning: oft mit vorher definierten Merkmalen
- Domänenwissen spielt dabei eine große Rolle, Feature-Engineering
- Deep Learning: relevante Merkmale werden über viele Schichten selbst aus den Daten gelernt
- dadurch besonders erfolgreich bei Bild-, Sprach-, Audio- und Videodaten
- Nachteile: hoher Daten-, Rechen- und Energiebedarf; oft schwerer interpretierbar
- inspiriert von den kognitiven Wissenschaften: im visuellen Kortex wird die von den Augen aufgenommene Information schichtweise verarbeitet und in höhere Repräsentationen überführt (auch im visuellen Kortex des Gehirns sind die Neuronen schichtweise angeordnet, in höheren Schichten werden die Schlüsselreize immer komplexer)

--

<!-- .slide: class="list08" -->

### Große Sprachmodelle (Large Language Models)

<br />

- trainiert auf sehr großen Text- und zunehmend auch multimodalen Datenmengen
- viele aktuelle Modelle haben Milliarden Parameter; bei proprietären Modellen sind genaue Größen oft nicht bekannt
- nach dem Vortraining folgen häufig Finetuning, RLHF (Reinforcement learning from human feedback) und Sicherheits-/Instruktionsanpassungen
- technische Grundlage seit 2017: die Transformer-Architektur mit Self-Attention-Mechanismus
  - Vaswani et al.: Attention Is All You Need. In: Advances in Neural Information Processing Systems. Vol. 30 (2017). ([doi:10.48550/arXiv.1706.03762](https://doi.org/10.48550/arXiv.1706.03762))
  - der Artikel auf [Google Scholar](https://scholar.google.com/scholar?cites=2960712678066186980)
  - vgl. auch Steven Levy: [8 Google Employees Invented Modern AI.](https://www.wired.com/story/eight-google-employees-invented-modern-ai-transformers-paper/) In: Wired, 20. März 2024.
- Allzweckmodelle
- komplexe Sachverhalte wie die Grammatik einer Sprache werden nicht durch Regelvermittlung, sondern durch die Masse an Trainingsdaten abgebildet
- Sprachmodelle, keine Wissensmodelle!

--

### Artificial General Intelligence

<br />

- meist verstanden als KI mit allgemeiner, nicht nur auf einzelne Aufgaben beschränkter Problemlösefähigkeit
- häufige Definition: Systeme, die Menschen in den meisten wirtschaftlich relevanten Tätigkeiten übertreffen
- problematisch:
  - keine allgemein akzeptierte, messbare Definition
  - suggeriert eine einheitliche Skala von »Intelligenz«
  - oft Teil von Zukunfts-, Hype- und Risikonarrativen
  - lenkt von gegenwärtigen Fragen ab: Arbeit, Macht, Daten, Bias, Ressourcenverbrauch

## Geschichte der neuronalen Netze

--

![Neuronzeichnung von Santiago Ramón y Cajal](https://img.santiagoramonycajal.org/w_1920/cajal/Santiago-Ramon-y-Cajal-Neurona-piramidal-de-la-corteza-cerebral-1904_qwky9k.jpg)<!-- .element: style="height:570px;" -->

(Bildquelle: [santiagoramonycajal.org](https://img.santiagoramonycajal.org/w_1920/cajal/Santiago-Ramon-y-Cajal-Neurona-piramidal-de-la-corteza-cerebral-1904_qwky9k.jpg))
<!-- .element: style="font-size:0.7em;" -->

--

### 19. Jahrhundert

<br />

- Erkenntnis der Biologie schon im 19. Jahrhundert: Neuronen als Körperzellen, auf denen die kognitiven Leistungen des Gehirns beruhen
- die Verknüpfungen zwischen den Neuronen ändern sich im Laufe des Lebens ständig = biologische Grundlage des Lernens (Santiago Ramón y Cajal)

--

### 20. Jahrhundert

<br />

- das anatomische Verständnis des Gehirns in der Mitte des 20. Jahrhunderts hat die Modelle der künstlichen Intelligenz geprägt
- Warren S. McCulloch (Neurophysiologe) und Walter Pitts (Logiker) schlugen 1943 künstliche Nervenzellen (Neuronen) als Recheneinheiten vor, um Funktionen des menschlichen Gehirns in einem formalen, logisch-mathematischen Modell nachzubilden (noch ohne Lernregel)
- biologisches Vorbild: die Nervenzellen des Gehirns
- die McCulloch-Pitts-Neuronen senden erst ein Signal, wenn die Summe ihrer Inputs einen gewissen Schwellenwert überschritten hat
- Implementierung von KI-Ansätzen erst Jahrzehnte später dank steigender Rechenkapazität und großer Mengen an (online) verfügbaren Trainingsdaten

--

<!-- .slide: class="list08" -->

### 20. Jahrhundert: <br />Vom Perzeptron zum »KI-Winter«

<br />

- 1956: achtwöchiger Dartmouth-Sommerworkshop = Geburtsstunde der KI-Forschung als eigenständiges akademisches Fachgebiet und Prägung des Begriffs ›AI‹ durch John McCarthy
- 1957/58: Frank Rosenblatt stellt das Perzeptron-Modell vor, ein einfaches, erstmals lernfähiges künstliches neuronales Netz
- einzelne Perzeptren sind aber begrenzt, hieraus entwickelte sich die Idee des mehrschichtigen Netzes: jede Schicht fungiert als Detektor für Muster, deren Ausgaben die Eingabe der nächsten Schicht bilden
- 1969: Marvin Minsky &amp; Seymour Papert ([»Perceptrons«](https://en.wikipedia.org/wiki/Perceptrons_(book))) zeigen die grundsätzlichen Grenzen einschichtiger Perzeptren, in der Folge kommt die Forschung an neuronalen Netzen weitgehend zum Erliegen
- »KI-Winter«: Phase(n) stark reduzierter Förderung und Aufmerksamkeit (1970er- und 1980er-Jahre)

--

<!-- .slide: class="list08" -->

### 20./21. Jahrhundert: <br />Durchbruch des Deep Learning

<br />

- 1986: der Backpropagation-Algorithmus (Rumelhart, Hinton &amp; Williams) macht das Training mehrschichtiger Netze praktikabel und belebt die Forschung neu
- vielversprechende Leistungen aber erst, durch wachsende Rechenkapazität (GPUs) und große Mengen (online) verfügbarer Trainingsdaten möglich
- 2012: AlexNet (Krizhevsky, Sutskever &amp; Hinton) gewinnt den ImageNet-Wettbewerb überlegen, Durchbruch des Deep Learning
- November 2015: Google veröffentlicht TensorFlow (Open-Source-Bibliothek für Deep Learning), Erstellung neuronaler Netze stark vereinfacht
- 2017: Transformer-Architektur (s. vorheriges Kapitel), Grundlage der heutigen großen Sprachmodelle

--

### Training

<br />

- neuronale Netze müssen trainiert werden, bevor sie bestimmte Aufgabe lösen können
- die einzelnen Neuronen werden solange auf bestimmte Muster trainiert, bis das Ergebnis (die Ausgabe der letzten Schicht) der zu lösenden Aufgabe entspricht
- überwachtes Lernen: ein Datensatz mit Beispielen, für die das jeweilige Problem bereits gelöst wurde
- Beispiel: sollen bestimmte Objekte auf Fotos erkannt werden, wird eine gewisse Zahl von annotierten Bildern benötigt, zu denen jeweils die korrekte Bezeichnung maschinenlesbar gespeichert ist

## GPT-Modelle

<br />

- GPT = Generative Pre-trained Transformer
- Modellfamilie von OpenAI für generative Sprachverarbeitung
- ursprünglich: automatische Textfortsetzung und Sprachmodellierung
- heute: Grundlage für Chatbots, Coding-Assistenten, multimodale Systeme und agentische Workflows
- wichtig: GPT-Modelle sind Sprach-/Multimodalmodelle, keine verlässlichen Wissensdatenbanken

--

### OpenAI: Organisation und Produkt

<br />

- OpenAI wurde 2015 als Nonprofit-Organisation gegründet
- seit 2019: for-profit-Struktur unter Nonprofit-Kontrolle
- hybrides Modell aus öffentlicher Mission, Investoreninteressen und kapitalintensiver Infrastruktur
- KI-Modelle sind als Technik nicht neutral, sondern auch Teil von Plattform-, Daten- und Machtstrukturen

--

### Wofür GPT-Modelle genutzt werden

<br />

- Texte generieren, zusammenfassen, umformulieren, vereinfachen, übersetzen
- Fragen beantworten und Informationen strukturieren
- Programmcode schreiben, erklären und debuggen
- Dokumente, Bilder, Tabellen und Dateien analysieren
- als Baustein in Chatbots, Suchsystemen, Office-Software, Coding-Tools und Agenten

--

### GPT-2

<br />

- vorgestellt im Februar 2019
- vollständige Version mit 1,5 Mrd. Parametern im November 2019 veröffentlicht
- Trainingsdatensatz: WebText, ca. 40 GB Text, aus ca. 8 Mio. Dokumenten
- OpenAI hat das Modell stufenweise veröffentlicht, weil Missbrauch befürchtet wurde (vgl. [faz.net, 19.02.2019](https://www.faz.net/-gsf-9jyo4))
- Grundprinzip: Vorhersage des nächsten Tokens auf Basis vorheriger Tokens

--

### GPT-3

<br />

- veröffentlicht 2020
- 175 Mrd. Parameter
- deutlicher Sprung gegenüber GPT-2
- zentraler Begriff: Few-Shot Learning
  - ein Modell bekommt im Prompt einige wenige Beispiele und erkennt daraus das gewünschte Muster bzw. die Aufgabe
  - es kann dann ähnliche Fälle bearbeiten, ohne neu trainiert zu werden
- GPT-3 konnte nicht nur Texte erzeugen, sondern auch einfache Programmieraufgaben bearbeiten
- öffentliche Wahrnehmung: Skalierung schien plötzlich neue, allgemeinere Fähigkeiten hervorzubringen

--

### Parameter

<br />

- Parameter sind gelernte Zahlenwerte in einem neuronalen Netz
- sie gewichten, wie stark bestimmte Muster, Merkmale oder Verbindungen in die Berechnung eingehen
- mehr Parameter bedeuten nicht automatisch »mehr Intelligenz«
- entscheidend außerdem:
  - Trainingsdaten
  - Trainingsverfahren
  - Architektur
  - Kontextfenster
  - Finetuning / RLHF

--

| Wikipedia               | 3 Mrd.       |

<br />

<small>

Quelle: Brown et al.: *Language Models are Few-Shot Learners* (2020).

</small>

### Trainingsdaten von GPT-3

<br />

- Common Crawl:
  - große öffentliche Web-Crawls seit 2008
  - Milliarden Webseiten/URLs, aber kein vollständiger Suchmaschinenindex
  - stark gefiltert; Qualität, Sprache und Redundanz sehr ungleich verteilt
- WebText2:
  - Webseiten, die über Reddit-Beiträge mit mindestens 3 Upvotes verlinkt wurden
  - Reddit-Upvotes dienen hier als grobes Qualitätssignal
  - Ergebnis: ca. 45 Mio. Weblinks
- Books1 und Books2:
  - zwei nicht genau offengelegte internetbasierte Buchkorpora
  - urheberrechtlich und wissenschaftlich problematisch, weil Provenienz unklar bleibt
- Wikipedia:
  - die gesamte (englischsprachige) Wikipedia

### Zu den Books-Korpora …

<br />

- … vgl. die Studie von Kent K. Chang, Mackenzie Cramer, Sandeep Soni, David Bamman: **[Speak, Memory: An Archaeology of Books Known to ChatGPT/GPT-4](https://arxiv.org/abs/2305.00118)** (28. April 2023)

### Tokenisierung

<br />

- Modelle verarbeiten nicht direkt Wörter, sondern Tokens
- Tokens können ganze Wörter, Wortteile, Zeichenfolgen, Satzzeichen oder Leerzeichen sein
- Tokenizer: [platform.openai.com/tokenizer](https://platform.openai.com/tokenizer)

--

### GPT-4

<br />

- veröffentlicht im März 2023
- Parameterzahl nie offiziell bestätigt
- Training des Modells kostete mehr als $100 Mio. (Quelle: [Wired](https://www.wired.com/story/openai-ceo-sam-altman-the-age-of-giant-ai-models-is-already-over/))
- unklar, welche Trainingsdaten benutzt wurden
- um Hate Speech usw. zu erkennen, wurden entsprechende Daten gelabelt, outgesourct an eine Firma in Kenia ([»Exclusive: OpenAI Used Kenyan Workers on Less Than $2 Per Hour to Make ChatGPT Less Toxic«](https://time.com/6247678/openai-chatgpt-kenya-workers/), time.com, 18. Januar 2023)
- Diskussion über technische Risiken
- Vorschlag eines Moratoriums ([»Experten fordern Denkpause für künstliche Intelligenz«](https://www.spiegel.de/netzwelt/netzpolitik/openai-und-chatgpt-experten-fordern-denkpause-fuer-kuenstliche-intelligenz-a-26eca454-b10d-4521-83a9-e8bf79ee6081), Spiegel Online, 29. März 2023)

--

### Nach GPT-4

<br />

- GPT-4o: multimodales Modell für Text, Bild und Audio; »o« = omni
- o1, o3, o4-mini: Reasoning-Modelle, die stärker auf längeres »Nachdenken« bzw. mehr Test-Time-Compute ausgelegt sind
- GPT-4.1: API-Modellfamilie mit stärkerem Fokus auf Coding, Instruktionsbefolgung und langem Kontext
- GPT-5.x: neuere Modellgenerationen in ChatGPT/API
- Modellnamen ändern sich schnell
- ChatGPT ist nicht identisch mit einem einzelnen Modell

--

### Urheberrechtskonflikte und Trainingsdaten

<br />

- zentrale Streitfrage:
  - Dürfen urheberrechtlich geschützte Texte ohne Zustimmung zum KI-Training verwendet werden?
- prominente Fälle:
  - New York Times vs. OpenAI/Microsoft
  - Verfahren gegen Meta, Anthropic, Microsoft u. a. wegen Buchdatensätzen
- Konfliktlinien:
  - Fair Use / Text and Data Mining
  - Vergütung von Autor\*innen und Verlagen

--

### Bücher als Trainingsdaten

<br />

- Bücher sind für LLMs besonders wertvoll:
  - lange kohärente Texte
  - kuratierte Sprache
  - literarische, wissenschaftliche und fachliche Vielfalt
- problematisch:
  - viele Trainingskorpora sind nicht transparent
  - Schattenbibliotheken wie LibGen oder Books3 spielen in mehreren Klagen eine Rolle
  - Autor\*innen können oft nicht nachvollziehen, ob ihre Werke im Training waren

--

### Unstillbarer Datenhunger

<br />

- LLM-Entwicklung beruhte lange auf Skalierung:
  - größere Modelle
  - mehr Daten
  - mehr Rechenleistung
- inzwischen entstehen Engpässe:
  - hochwertige Webdaten sind begrenzt
  - viele Inhalte werden rechtlich abgeschirmt
  - Plattformen schließen Datenzugänge
  - KI-generierter Text fließt zurück ins Web
- Gefahr:
  - Modelle trainieren zunehmend auf Texten, die selbst von Modellen erzeugt wurden
  - das kann Qualität, Vielfalt und Quellenbezug verschlechtern

--

### ChatGPT

<br />

- veröffentlicht am 30. November 2022
- ursprünglich als Research Preview
- machte LLMs massenhaft sichtbar und nutzbar
- Produkt, nicht nur Modell
- Freemium-/Abo-Modell mit unterschiedlichen Nutzungsgrenzen und Modellzugängen

--

### Missbrauchsszenarien mit GPT

<br />

- Spam
- Phishing
- Desinformation und Propaganda
- Astroturfing / künstliche öffentliche Meinung
- automatisierte Kommentar- und Review-Produktion
- Plagiarismus oder nicht offengelegte KI-Mitautorschaft
- massenhafte Produktion von SEO- und Content-Farm-Texten

--

### Weitere Risiken von LLMs

<br />

- Halluzinationen: plausible, aber falsche Antworten
- fehlende oder erfundene Quellen
- Bias: Reproduktion gesellschaftlicher Vorurteile
- Datenschutz und vertrauliche Informationen
- Urheberrecht und ungeklärte Trainingsdaten
- Umweltkosten:
  - Training
  - Rechenzentren
  - Wasser- und Energieverbrauch
- Machtkonzentration bei wenigen Plattformunternehmen

### LLMs sind keine Suchmaschinen

<br />

- LLMs erzeugen wahrscheinliche Fortsetzungen
- sie garantieren keine Wahrheit
- sie können Fakten, Quellen und Zitate erfinden
- aktuelle Systeme kombinieren LLMs oft mit Websuche oder Retrieval
- trotzdem bleibt nötig:
  - Quellen prüfen
  - Angaben verifizieren
  - Primärquellen lesen
  - Unsicherheit markieren

--

### KI-Kompetenz im Beruf

<br />

- 2023: großer Hype um »Prompt Engineering« als neues Berufsbild
- inzwischen differenzierter:
  - als isolierter Jobtitel eher selten
  - als Kompetenz weiterhin wichtig
- wichtiger als »magische Prompts«:
  - Aufgaben gut formulieren
  - Kontext bereitstellen
  - Ergebnisse prüfen
  - Workflows entwerfen
  - Grenzen des Systems kennen
  - verantwortliche Nutzung dokumentieren
