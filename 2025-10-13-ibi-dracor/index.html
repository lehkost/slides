### Digitale Dramenforschung *at scale*?

<br />

- multilinguale Dramenkorpora
- Standardformat der Text Encoding Initiative (TEI)
- Hosting (Code, Daten, Website)
- Schnittstelle (API) im Sinne des ›programmable web‹ (Aaron Swartz)
- Tools
- Normdaten und Linked Open Data
- FAIR-Prinzipien (findable, accessible, interoperable, reusable)
- Trainingsmaterial (Open Educational Resources)
- Community!

### Voraussetzung: Kodierungsstandard TEI (2/2)

<br />

```xml
<sp who="#felden">
  <speaker>Felden.</speaker>
    <p>
      Wie viele Buchstaben hat denn das Alphabet der Katzen-Sprache?
    </p>
</sp>
<sp who="#anton">
  <speaker>Anton.</speaker>
    <p>
      Das will ich Ihnen erklären, denn der Herr Sprachmeister hat es mich
      schon gelehrt. Es hat nur 4 Buchstaben: M. I. A. U; das heißt: Miau.
      Aus diesen 4 Buchstaben formiren sich aber sämmtliche Wörter, und die
      Verschiedenheit der Töne, und die Geschwindigkeit des Ausdruckes oder
      das Aushalten der Sylben formirt die Wörter […]
    </p>
</sp>
```

<br />

Dialog aus Karl von Eckartshausens Lustspiel »Der Pudelhund« (1800) in TEI (Text Encoding Initiative), Quelle: [DraCor](https://dracor.org/id/ger000524). <br />Momentan sind im Standard 587 verschiedene Elemente definiert ([Stand November 2024](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).
<!-- .element: style="font-size:0.65em;" -->

### GerDraCor

<br />

- mittlerweile 748 Dramen von 1500 bis 1950 (wird stetig ergänzt)
- 16.089 Figuren (M: 11.357, F: 3.350)
- ca. 11,7 Mio. Tokens
- Community-Projekt:
  - Trainingsmaterialien und Anwendungsbeispiele [bei forTEXT](https://fortext.net/ressourcen/textsammlungen/dracor-drama-corpora-project) (Hamburg/Darmstadt)
  - [Nathalie Wiedmer et al.](https://quadrama.github.io/publications/Wiedmer2020aa): Annotation von Beziehungen der Figuren untereinander (Familien- und Liebesverhältnisse, dienstliche Abhängigkeiten)

### Einfache Visualisierung von Strukturdaten
#### Anzahl von Figuren pro Stück in chronologischer Folge (1/2)

<br />

library(data.table)
library(ggplot2)
gerdracor <- fread("https://dracor.org/api/v1/corpora/ger/metadata/csv")
ggplot(gerdracor[], aes(x = yearNormalized, y = numOfSpeakers)) + geom_point()
```

<br />

Beispiel für einfaches R-Skript, das die Daten über die API bezieht.

### Forschungsbeispiel 1:

Peer Trilcke, Christopher Kittel, Nils Reiter, Daria Maximova, Frank Fischer: <br />**[Opening the Stage: A Quantitative Look at Stage Directions in German Drama.](https://dh2020.adho.org/wp-content/uploads/2020/07/337_OpeningtheStageAQuantitativeLookatStageDirectionsinGermanDrama.html)** <br />In: DH2020: »carrefours/intersections«. Book of Abstracts. University of Ottawa.

### Forschungsbeispiel 2:

#### Requisiten in Prosa- und Versdramen

<br />

| **Requisit bzw. Typ von Requisit** | **Prosadrama (N = 378)**     | **Versdrama (N = 231)**     |
| ---------------------------------- | ---------------------------- | --------------------------- |
| Waffen                             | 60,1 %                       | 75,3 %                      |
| Feuerwaffen                        | 18,8 %                       | 7,8 %                       |
| Dolch                              | 10,6 %                       | **26,0 %**                  |
| Kaffee                             | **13,8 %**                   | 1,3 %                       |

<br />

- Prozentzahlen: in wie vielen Prosa- und Versdramen kommt ein bestimmtes Requisit bzw. ein bestimmter Typ von Requisit *mindestens einmal* vor.

<!-- .element: style="font-size:0.7em;" -->

<br />Quelle: Jonah Lubin, Anke Detken, Frank Fischer: Das »ureigenste theatralische Element« – Automatische Extraktion von Requisiten aus deutschsprachigen Dramentexten. In: DHd2024: »DH Quo Vadis«. 26. Februar–1. März 2024. Book of Abstracts. Universität Passau. ([doi:10.5281/zenodo.10698448](https://doi.org/10.5281/zenodo.10698448))
<!-- .element: style="font-size:0.7em; text-align:left;" -->

### DraCor und das Model Context Protocol (MCP)

<br />

- Kombination der Stärken von TEI-Codierung, API-Output und dem ›Wissen‹ großer Sprachmodelle? MCP!
- offener Standard zur Verbindung von KI-Modellen mit externen Daten/Werkzeugen:
  - [»Think of MCP like a USB-C port for AI applications.«](https://modelcontextprotocol.io/docs/getting-started/intro)
- veröffentlicht von Anthropic im November 2024
- bis Juni nur 280 Erwähnungen des MCP bei Google Scholar, Stand heute sind es 1.150

--

### DraCor-MCP-Server

<br />

- Ingo Börner (2025): DraCor MCP Server (Version v1.0.0-alpha.2) [Computer software]. GitHub. https://github.com/dracor-org/dracor-mcp
- Wenn man Claude zu dramatischen Texten befragt, kann das LLM …
  - auf Ressourcen wie Korpora, Werke, Figuren und Netzwerke zugreifen
  - Werkzeuge zum Suchen, Vergleichen und Analysieren von Stücken verwenden
  - (interaktive) Visualisierungen auf Basis dieser Daten liefern
- die DraCor-API ist öffentlich zugänglich (keine Authentifizierung erforderlich)

--

### Ein Beispiel

<br />

- Prompt:
  - »Wer ist die Hauptfigur in Kleists Theaterstück "Prinz Friedrich von Homburg" im deutschen Dramenkorpus? Beschreibe die Rolle dieser Figur im Netzwerk.«
