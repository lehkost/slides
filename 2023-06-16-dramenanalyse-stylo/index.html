## 2. Was ist eigentlich Stilometrie?

--

### Stylometry is …

<br />

… »the analytic study of literary **styles**, especially as applied to questions of **authorship**«

<br />

Quelle: https://www.dictionary.com/browse/stylometry

--

### »The Main Assumption of …

<br />

… underlying stylometric studies is that authors have an unconscious as well as a conscious aspect to their style«

<br />

Quelle: [Encyclopaedia of Statistical Sciences](https://onlinelibrary.wiley.com/doi/10.1002/0471667196.ess1174.pub2)

--

### »Stylometric studies …

<br />

… in all their variety of material and method, have two features in common: the electronic texts they study have to be coaxed to yield numbers, and the numbers themselves have to be processed via statistics.«

<br />

<small>Maciej Eder, Jan Rybicki, Mike Kestemont: [‘Stylo’: a package for stylometric analyses](https://docs.google.com/viewer?a=v&pid=sites&srcid=ZGVmYXVsdGRvbWFpbnxjb21wdXRhdGlvbmFsc3R5bGlzdGljc3xneDpmM2U3OGUzZTM2YjkyYzM) (2017)</small>

--

### Was gezählt werden kann

<br />

- Worthäufigkeiten
- n-Gramme von Zeichen
  - ‘nte’, ‘ichn’, ‘gefal’
- Lemmata
  - (Tier/Tiere/Tieres ➝ Tier)
- Wortarten
- syntaktische Strukturen
- Metrum (bei Versen)
- …

--

### Warum sollte man das tun, <br />einen Text so »messen«?

<br />

- Streitigkeiten über Autor\*innenschaft
- Gattungsvergleich
- Vergleich verschiedener Sprecher\*innen
- Vergleich von Originalen und Übersetzungen
- Stil früher vs. Stil später Texte
- forensische Linguistik, Security, Anonymität

### Erste quantifizierende Unternehmungen

- 1851: der englische Mathematiker Augustus de Morgan schlägt vor, die Länge von Wörtern als Indikator für individuellen Stil zu verwenden (vgl. [Grzybek 2007](https://doi.org/10.1007/978-1-4020-4068-9_2))
- 1873: die New Shakespeare Society fördert den Einsatz quantitativer Methoden zur Klärung strittiger Fragen zur Autorschaft und Chronologie des Shakespeare-Kanons (F.&nbsp;J. Furnivall, F.&nbsp;G. Fleay)
- 1887: T. C. Mendenhall, [»The Characteristic Curves of Composition«](https://www.jstor.org/stable/1764604), erste bekannte Arbeit zur Quantifizierung von Autor\*innenschaft

![caption](images/characteristic-curves.jpg)<!-- .element: style="height:250px;" -->

--

### Stilometrische Morgendämmerung

<br />

- 1867: L. Campbell: [»The Sophistes and Politicus of Plato«](https://books.google.com/books?id=JJA82qlzJzQC&printsec=frontcover)
- 1881: W. Dittenberger: [»Sprachliche Kriterien für die Chronologie der Platonischen Dialoge«](https://www.jstor.org/stable/4471771)
- 1898: W. Lutosławski: [»Principes de stylométrie appliqués à la chronologie des œuvres de Platon«](https://www.jstor.org/stable/44283556)
- 1915: N.&nbsp;A. Morosow: [»Лингвистические спектры«](https://www.textology.ru/library/book.aspx?bookId=1&textId=3) (»Linguistische Spektren«, inspiriert von Lutosławski)
- 1916: A.&nbsp;A. Markow: [»Об одном применении статистического метода«](https://www.ras.ru/namorozovarchive/2_actview.aspx?id=725) (»Über eine Anwendung der statistischen Methode«, Rezension von Morosows Artikel) – offenbar der Erste, der die Bedeutung von Funktionswörtern erkannt hat

### Durchbruch in den 1960er-Jahren: <br />Federalist Papers

<br />

- »eine Serie von 85 Artikeln, die 1787/88 in verschiedenen New Yorker Zeitungen veröffentlicht wurden und die Bevölkerung des Staats New York dazu bewegen sollten, der 1787 entworfenen aber noch nicht ratifizierten föderalen Verfassung der Vereinigten Staaten von Amerika zuzustimmen«
- Autorschaft von 12 Artikeln war umstritten (von Hamilton oder Madison verfasst?)
- Frederick Mosteller, David L. Wallace: [»Inference in an Authorship Problem«](https://doi.org/10.1080/01621459.1963.10500849) (1963)
- Bestimmung der Urheberschaft der umstrittenen Schriften, Vorschlag einer Standardmethode zur Lösung von Urheberschaftsproblemen

--

### Mosteller & Wallace, 1963

<br />

- »The **function words** of the language appear to be a fertile source of discriminators, and luckily the high-frequency words are the strongest.«
- »it is important to have a **variety of sources of material**, to allow ‘between writings’ variability to emerge«
- »In summary, the following points are clear:«
  - »Madison is the principal author. These data make it possible to say far more than ever before that the odds are enormously high that Madison wrote the 12 disputed papers.«
  - »While choice of under­lying constants (choice of prior distributions) matters, it doesn’t matter very much, once one is in the neighborhood of a distribution suggested by **a fair body of data**.«

## 4. Delta-Methode

--

### Burrows’ Delta

<br />

- Standardmaß in der Stilometrie seit 2002
- statt semantischer Inhaltswörter werden vor allem Funktionswörter betrachtet (die häufigsten Wörter)
- diese most frequent words (MFW) werden von Autor\*innen kaum bewusst manipuliert
- Burrows’ Delta verstehen: https://zfdg.de/2017_006#hd2
- sehr einfache Mathematik

--

### z-Score

![caption](images/z-score.svg)<!-- .element: style="height:150px;" -->

- x: Häufigkeit des Wortes in einem Text<!-- .element: style="font-size:0.8em;" -->
- µ (my): allgemeine Worthäufigkeit im Korpus<!-- .element: style="font-size:0.8em;" -->
- σ (sigma): Standardabweichung der Worthäufigkeit im Korpus (= durchschnittliche Entfernung der einzelnen Werte vom Mittelwert)<!-- .element: style="font-size:0.8em;" -->

»von jedem Wert (x) [wird] der Mittelwert des Types (µ) in der Sammlung abgezogen und das Ergebnis durch die Standard- <br />abweichung (σ) des Types geteilt.« (Schöch 2017, S. 285)

--

<br />

- Korpus: 11 Dramen (Prosa und Vers)
  - 4 × G. E. Lessing
  - 3 × L. A. V. Gottsched

#### Visualisierung der Abstände im Dendrogramm

![Ergebnis der Clusteranalyse](images/stylo-dramen-experiment.png)<!-- .element: style="height:180px;" -->

tl;dr: »Die Zahlen in der horizontalen Leiste unten geben die Werte des jeweils <br />ausgewählten Distanzmaßes an (hier Classic Delta Distance).« ([forTEXT](https://fortext.net/routinen/lerneinheiten/stilometrie-mit-stylo))
<!-- .element: style="font-size:0.65em;" -->

Genauer: Diese Skala zeigt den gemessenen Abstand zwischen den Texten an. Die Werte auf der Skala entsprechen den ursprünglichen Einheiten, die zur Abstandsberechnung verwendet wurden. Wenn zum Beispiel eine klassische Manhattan-Distanz auf der Grundlage relativer Worthäufigkeiten berechnet wurde, zeigt die Einheit die durchschnittliche Differenz zwischen einem Textpaar an, ausgedrückt in relativen Häufigkeiten. Wenn z.&nbsp;B. zwei Texte vorliegen, in denen die Häufigkeit von »die« 0,04 und 0,01 (bzw. 4% und 1%) und die Häufigkeit von »von« 0,02 und 0,02 beträgt, dann ist der Gesamtabstand ((0,04 – 0,01) + (0,02 – 0,02) / 2) = (0,03 + 0) / 2 = 0,015. Da die Häufigkeiten in der Regel mit 100 multipliziert werden, um Prozentsätze zu erhalten, wäre die endgültige Punktzahl ebenfalls 0,015 * 100 = 1,5.
<!-- .element: style="font-size:0.65em;" -->

Classic Delta und Cosinus Delta (auch andere Deltas) basieren auf den z-Scores und nicht auf Häufigkeiten. Folglich werden die Abstände und die Skalen in Dendrogrammen in z-Scores und Differenzen zwischen z-Scores ausgedrückt. Da eine »1« in z-Scores »1 Standardabweichung« bedeutet, lässt sich dies auch auf die Skalen von Dendrogrammen übertragen. Eine Einheit bedeutet also »1 Standardabweichung« zwischen den zu vergleichenden z-Scores. (Mit Dank an Maciej Eder!)
<!-- .element: style="font-size:0.65em;" -->

## 6. Stylo

--

### Stylo: zwei der Hauptfunktionen

<br />

- stylo()
- oppose()

--

### stylo()

<br />

- Berechnung und Visualisierung stilistischer Nähe
- verschiedene Arten des Clusterns (Gruppierens) von Texten nach Nähekriterien
- Darstellung des mehrdimensionalen »stilistischen Raums« von Texten auf einer 2D-Ebene
- Listen der am häufigsten verwendeten Wörter, Häufigkeitstabellen usw.

--

### oppose()

<br />

- kontrastive Analyse
- bevorzugte/vermiedene Wörter
- Vergleich verschiedener Typen von Sprechinstanzen (z.&nbsp;B. männliche vs. weibliche Stimmen)
- Kurzvorstellung in [dieser Präsentation](https://computationalstylistics.github.io/stylo_nutshell/#main-functions-oppose) (Folien 7 und 26–28)

--

### oppose()

<br />

- basiert auf Burrows’ Zeta (2007):
  - »Texte werden in kleinere Segmente gesplittet, wobei die Segmentlänge ein wichtiger Parameter ist. Dann wird für jedes Merkmal der Anteil der Segmente erhoben, in denen das Merkmal mindestens einmal vorkommt. Von diesem Anteil in der untersuchten Gruppe wird der entsprechende Anteil in der Vergleichsgruppe subtrahiert, woraus sich ein Zeta-Wert zwischen –1 und 1 ergibt« ([uni-wuerzburg.de](https://www.informatik.uni-wuerzburg.de/datascience/projects/concluded-projects/cligs/?tx_extbibsonomycsl_publicationlist%5Baction%5D=download&tx_extbibsonomycsl_publicationlist%5Bcontroller%5D=Document&tx_extbibsonomycsl_publicationlist%5BfileName%5D=DHd2018_pyzeta.pdf&tx_extbibsonomycsl_publicationlist%5BintraHash%5D=03d6baf7b43a7c8d4c2815c1f04c60d0&tx_extbibsonomycsl_publicationlist%5BuserName%5D=dmir&cHash=93fb54cc785fbfc0587eed24b123abbb))
- NB. zur Segmentierung als philologischem Verfahren vgl. Sabine Bartsch, Evelyn Gius, Marcus Müller, Andrea Rapp, Thomas Weitin: *Sinn und Segment. Wie die digitale Analysepraxis unsere Begriffe schärft.* In: *Zeitschrift für digitale Geisteswissenschaften* 8 (2023). 01.06.2023. ([doi:10.17175/2023_003](https://doi.org/10.17175/2023_003))
