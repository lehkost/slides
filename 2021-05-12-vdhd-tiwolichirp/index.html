## Workflow

![UIMA-Pipeline](images/uima-pipeline.png)

UIMA: Architektur zur Verarbeitung unstrukturierter Informationen. <br />Hauptwerkzeug zur Extraktion temporaler Angaben: **[HeidelTime](https://ds.ifi.uni-heidelberg.de/research/heideltime/)**. HeidelTime erkennt nicht nur explizite <br />Datumsangaben, sondern auch Zeitangaben wie „gestern“, „im Mai 2021“ oder „nächste Woche“.
