### »Computational thinking« bei Boris Yarkho

<br />

- »Eine große Unannehmlichkeit der von uns vorgeschlagenen komparativ-statistischen Methode ist die Unwahrscheinlichkeit, dass eine Person jemals in der Lage wäre, eine ausreichende Anzahl von Merkmalen der Klassik und der Romantik zu studieren, wenn sie dies nicht zu ihrem gesamten Lebenswerk machen will.«
- »Die Berechnung [eines bestimmten Koeffizienten] würde jedoch über 150 Berechnungen von Standardabweichungen erfordern. Da wir dafür nicht die entsprechenden Mitarbeiter zur Verfügung hatten, hätten wir damit mehr Zeit verloren, als es wert gewesen wäre.«
- »Wir haben die Technik demonstriert; der Weg ist frei für diejenigen, die mehr Glück haben als wir.«

(Übers. F. F.)
<!-- .element: style="font-size:0.65em;" -->

### Voraussetzung: Kodierungsstandard TEI (2/2)

<br />

```xml
<sp who="#felden">
  <speaker>Felden.</speaker>
    <p>
      Wie viele Buchstaben hat denn das Alphabet der Katzen-Sprache?
    </p>
</sp>
<sp who="#anton">
  <speaker>Anton.</speaker>
    <p>
      Das will ich Ihnen erklären, denn der Herr Sprachmeister hat es mich
      schon gelehrt. Es hat nur 4 Buchstaben: M. I. A. U; das heißt: Miau.
      Aus diesen 4 Buchstaben formiren sich aber sämmtliche Wörter, und die
      Verschiedenheit der Töne, und die Geschwindigkeit des Ausdruckes oder
      das Aushalten der Sylben formirt die Wörter […]
    </p>
</sp>
```

<br />

Dialog aus Karl von Eckartshausens Lustspiel »Der Pudelhund« (1800) in TEI (Text Encoding Initiative), Quelle: [DraCor](https://dracor.org/id/ger000524). <br />Momentan sind im Standard 588 verschiedene Elemente definiert ([Stand Februar 2026](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).
<!-- .element: style="font-size:0.65em;" -->

### Qu’est-ce qu’une API ?

<br />

- standardisierter Austausch von Informationen zwischen einer Anwendung und einzelnen Programmteilen
- modularisierte, vereinfachte Programmierung
- Übergabe von Daten erfolgt strukturiert nach einer definierten Syntax
- speziell: REST API (für Webservices)

library(data.table)
library(ggplot2)

ggplot(gerdracor[], aes(x = yearNormalized, y = numOfSpeakers)) + geom_point()
```
