<br />

### Georeferenzierung historischer Karten

<br />

- offene, nachnutzbare Daten (CC0)

### Choroplethenkarten

<br />

- altgr. χῶρος choros ›Ort‹ und πλῆθος plethos ›Vielzahl‹
- auch *Flächenkartogramm*
- thematische Karte, bei der die Gebiete im Verhältnis zur Verteilungsdichte des thematischen Objektes eingefärbt sind
- Beispiel: Corona-Inzidenzen, Wahlergebnisse u. a. pro Landkreis oder Bundesland
- Nachteil: ein Landkreis mit großer Fläche bei niedriger Bevölkerungszahl erscheint gewichtiger, vgl. [diesen Beitrag von Christoph Pahmeyer](https://observablehq.com/@chrispahm/nicht-die-flache-wahlt-sondern-die-menschen#vote_map_animation)
- Florian Hruby: 190 Jahre Choroplethenkarten. Ein Zwischenresümee. In: Journal of Cartography and Geographic Information. Vol. 66 (2016), S. 58–65. ([doi:10.1007/BF03545206](https://doi.org/10.1007/BF03545206))

--

### Formate für GIS

--

### Shapefile

<br />

Ein proprietäres, aber relativ offenes Geoformat, das von der Firma ESRI (ArcGIS) entwickelt wurde. Das am häufigsten verwendete Format in anspruchsvolleren GIS.

--

### GeoPackage (GPKG)

<br />

- offener OGC-Standard, Vektor und Raster in einem SQLite-File
- moderner Nachfolger des Shapefiles ohne dessen technische Altlasten

--

### Keyhole Markup Language (KML)

<br />

Open-Source-Sprache, die für die Verwendung in Google Earth entwickelt wurde. Der Vorteil ist die Einbeziehung von Höhendaten.

--

### GeoJSON

<br />

Beliebte Open-Source-Sprache. Wird sehr häufig im Internet verwendet.

--

### TopoJSON

<br />

<small>Erweiterung von GeoJSON (verwendet statt Längen- und Breitengraden ein eigenes Koordinatensystem; <br />gemeinsam genutzte Liniensegmente – Arcs – werden zusammengefügt).</small>

![image](https://upload.wikimedia.org/wikipedia/commons/1/18/Topojson_shapes-en.svg)

--

### OpenStreetMap (OSM)

<br />

- freie, von einer Community erstellte Weltkarte (»Wikipedia der Karten«, seit 2004)
- offene Daten ([ODbL](https://en.wikipedia.org/wiki/Open_Database_License)); Grundlage von QGIS, Leaflet, MapLibre, DARIAH-Geo-Browser etc.
- Massenabfragen über die [Overpass-API](https://overpass-turbo.eu/)
- [uMap](https://umap.openstreetmap.fr/): eigene Karten ohne Code (freie Alternative zu Google My Maps)

### Organic Maps

<br />

- freie Offline-Karten- und Navigations-App (Android/iOS), auf Basis von OpenStreetMap
- 100% offline: Karten, Suche und Navigation ohne Internetverbindung
- datenschutzfreundlich: keine Werbung, kein Tracking, keine Datensammlung
- Open Source, 2020 als Fork von Maps.me entstanden
- enthält einen einfachen OSM-Editor zum Mitbearbeiten der Karte
- [organicmaps.app](https://organicmaps.app/)
- 2025 wegen Streit um die Projekt-Governance wiederum zu [CoMaps](https://www.comaps.app/) geforkt

--

### Orte als Linked Open Data

<br />

- ein **Gazetteer** (Ortsverzeichnis) vergibt stabile IDs (URIs) für Orte und verknüpft so Daten aus verschiedenen Quellen
  - [GeoNames](https://www.geonames.org/) – global, aktuell, mehrere Millionen Orte
  - [Pleiades](https://pleiades.stoa.org/) – Antike (Mittelmeerraum)
  - [World Historical Gazetteer](https://whgazetteer.org/) – historische Orte über Zeit und Sprachen hinweg
  - [Wikidata](https://www.wikidata.org/) – Koordinaten + Normdaten (GND, VIAF usw.) → nächste Woche

--

### Geoparsing: Orte aus Texten gewinnen

<br />

1. Erkennen: Ortsnamen im Text finden (Named Entity Recognition)
2. Auflösen: jeden Namen einem Gazetteer-Eintrag zuordnen (Georesolution)
3. Kartieren: die aufgelösten Koordinaten darstellen

<br /><br />

»Weimar« (Thüringen) ≠ »Weimar« (Texas): erst die Auflösung macht aus dem Wort einen Ort.

--

### Recogito

<br />

- [recogito.pelagios.org](https://recogito.pelagios.org/) (Pelagios Network): semantische Ortsannotation in Texten und Bildern bzw. Karten
- erkennt Ortsnamen automatisch (NER) und schlägt Gazetteer-Einträge vor
- NER u. a. für Deutsch, Englisch, Französisch, Spanisch
- Import auch direkt per IIIF-Manifest; Open Source

### Warum?

### »Mapping the Republic of Letters«

![Mapping the Republic of Letters (Screenshot)](https://www.neh.gov/sites/default/files/2019-10/republic-of-lettters.jpg)<!-- .element: style="height:300px;" -->

- Korrespondenznetze der Aufklärung, Pionierprojekt der digitalen Geschichte ([CESTA, Stanford](http://republicofletters.stanford.edu/); seit 2008)
- nicht die Briefinhalte zählen, sondern Absender, Empfänger, Orte und Zeit
- bestand die »Gelehrtenrepublik« aus einem großen Netzwerk oder waren es viele kleine?

--

### ORBIS

![image](images/orbis-augusta-treverorum-roma.png)<!-- .element: style="height:300px;" -->

- »The Stanford Geospatial Network Model of the Roman World« (Scheidel/Meeks, 2012): berechnet Reisezeit und -kosten im Römischen Reich um 200 n. Chr., über Straßen, Flüsse und Seerouten, je nach Verkehrsmittel und Jahreszeit
- [orbis.stanford.edu](https://orbis.stanford.edu/)

--
