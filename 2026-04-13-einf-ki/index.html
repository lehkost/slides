### Zum Einstieg

<br />

Chris Anderson: **The End of Theory**: The Data Deluge Makes the Scientific Method Obsolete. In: Wired 16 (**2008**), S. 108–109. (URL: [wired.com/2008/06/pb-theory/](https://www.wired.com/2008/06/pb-theory/))
<!-- .element: style="font-size:0.9em; text-align:left;" -->

<br />

»Sixty years ago, digital computers made information readable. Twenty years ago, the Internet made it reachable. Ten years ago, the first search engine crawlers made it a single database. Now Google and like-minded companies are sifting through the most measured age in history, treating this **massive corpus** as a **laboratory of the human condition**. They are the children of the Petabyte Age.«
<!-- .element: style="font-size:0.7em; text-align:left;" -->

»Who knows why people do what they do? The point is they do it, and we can track and measure it with unprecedented fidelity. **With enough data, the numbers speak for themselves.**&laquo;
<!-- .element: style="font-size:0.7em; text-align:left;" -->

»We can stop looking for models. We can analyze the data without hypotheses about what it might show. We can throw the numbers into the biggest computing clusters the world has ever seen and **let statistical algorithms find patterns** where science cannot.«
<!-- .element: style="font-size:0.7em; text-align:left;" -->

#### Wiederholung

### Wofür steht GPT?

<br />

**G**enerative **P**re-trained **T**ransformer
<!-- .element: class="fragment" -->

<br />

<small>(dt. generatives, vortrainiertes Transformationsmodell)<!-- .element: class="fragment" -->

- generative: basierend auf erlernten Mustern können neue Inhalte generiert werden<!-- .element: class="fragment" -->
- pre-trained: das Modell wurde auf großen Datensätzen trainiert, um ein allgemeines Verständnis (von Sprache) zu entwickeln<!-- .element: class="fragment" -->
- transformer: Computermodell, das vor allem für die Verarbeitung von Text verwendet wird<!-- .element: class="fragment" -->

</small>

--

### Lernziele

<br />

1. Sie können die Geschichte der KI von ihren konzeptuellen Anfängen bis zu den heutigen LLMs in wesentlichen Etappen nachzeichnen und zentrale Akteur\*innen, Institutionen und Wendepunkte benennen.
2. Sie können in Grundzügen erklären, wie Deep Learning funktioniert, was ein Transformer ist, was unter Parametern, Open Weight und anderen Grundbegriffen zu verstehen ist.
3. Sie können Vor- und Nachteile verschiedener KI-Systeme (kommerzielle vs. offene, cloudbasierte vs. lokale usw.) einschätzen.
4. Sie können die materiellen Voraussetzungen generativer KI als Formen von Extraktivismus beschreiben und in postkoloniale und ökologische Diskurse einordnen.
5. Sie können Policytexte aus dem KI-Umfeld einordnen, ihre impliziten Annahmen und ihre ideologischen Rahmungen identifizieren.
6. Sie können beurteilen, wie generative KI den Textbegriff, den Autor\*innenschaftsbegriff und ästhetische Kategorien herausfordert.

<!-- .element: style="font-size:0.9em; text-align:left;" -->
