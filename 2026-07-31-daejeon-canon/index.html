## Beginnings

<br />

On 9 January 1886, John Lubbock, an English banker, Liberal politician, and polymath, delivered a lecture at the Working Men’s College in London <br />entitled _On the Pleasure of Reading_.

In the lecture, he recommended a selection of one hundred books <br />that he considered especially worth reading.

<!-- .element: class="fragment" -->

Two days later, _The Pall Mall Gazette_ reported on the lecture and helped popularise Lubbock’s selection as a list of the _Best Hundred Books_.

<!-- .element: class="fragment" -->

--

![Lubbock’s Best Hundred Books in a Pall Mall Gazette extra edition (1886)](images/1886_best-hundred-books-pall-mall-gazette.png)<!-- .element: style="height:440px;" -->

(via [Wikimedia Commons](<https://commons.wikimedia.org/w/index.php?title=File%3ALubbock_-_The_Best_Hundred_Books_(1886).pdf&page=17>))

<!-- .element: style="font-size:0.65em;" -->

--

In 1891, Jenkin Lloyd Jones, a prominent American Unitarian minister, published a small brochure entitled _Ten Great Novels_. The list was based on a survey conducted in 1884 and therefore predates Lubbock’s “best books.”

It received seventy responses, naming 147 different novels, including works originally written in languages other than English.

<!-- .element: class="fragment" -->

Ranked by number of votes, the winning titles were …

<!-- .element: class="fragment" -->

--

![page from Jenkin Lloyd Jones: Ten Great Novels (1891)](images/1891_ten-great-novels.png)<!-- .element: style="height:540px;" -->

(image source: [Google Books](https://books.google.com/books?id=a5xPAQAAMAAJ&pg=PA3))

<!-- .element: style="font-size:0.65em;" -->

--

In 1898, Clement K. Shorter published his list <br />_A Hundred Books for a Village Library._

In 1899, _The Daily Telegraph_ published <br />a list of the _100 Best Novels in the World._

<!-- .element: class="fragment" -->

In 1916, John Cowper Powys published <br />_One Hundred Best Books._

<!-- .element: class="fragment" -->

--

Between 1978 and 1980, German weekly _Die Zeit_ <br />published _Die ZEIT-Bibliothek der 100 Bücher._

In 1991, the Swedish literary magazine _Tidningen Boken_ published _Världsbiblioteket_, a list of the 100 best books in world literature.

<!-- .element: class="fragment" -->

At the end of the twentieth century, <br />“books of the century” lists proliferated …

<!-- .element: class="fragment" -->

--

In 1998, the _Modern Library_ listed the _100 Best Novels_, produced <br />with the “assistance of a distinguished Board made up of celebrated <br />authors, historians, critics, and publishing luminaries.”

In 1999, _Le Monde_ published _Les cent livres du siècle_, based <br />on a poll in which approximately 17,000 participants took part.

<!-- .element: class="fragment" -->

In 2001, the Spanish daily _El Mundo_ published <br />_Las 100 mejores novelas en castellano del siglo XX._

<!-- .element: class="fragment" -->

In 2005, _Time_ magazine published its _All-TIME 100 Novels_, a list of 100 English-language novels published since 1923 and selected by two _Time_ critics.

<!-- .element: class="fragment" -->

--

And then, in the past two years, this happened …

## Conclusion and Outlook

--

### Conclusion

Canon Shelf and Canon Curator place canon lists within digital encyclopedic and reading communities, enabling analysis of circulation, visibility, and authority-building across platforms.

--

### Outlook

- More indicators/sources
- Web interface
- API
- SPARQL endpoint

---

### Mapping and Contextualisation

<br />

1. Making lists machine-readable in a standard format (CSV/TSV, JSON, or other);
2. enriching authors and works with identifiers of authority files and reading-community projects like
  - Wikidata,
  - GND (and other national libraries),
  - Goodreads,
  - LibraryThing,
  - [Perlentaucher](https://perlentaucher.de/), [Book Marks](https://bookmarks.reviews/) (for recent books),
  - etc.;
3. pulling in external (and mostly time-sensitive) data on authors and works.

--

### Contribution to the Digital Deconstruction <br />of Canons through …

<br />

- … the analysis of metadata (publication periods, linguistic and geographical diversity),
- … the correlation with other markers of canonicity,
- … the comparison between canons, measure overlaps, biases, overall development.

### Markers of Canonicity: Sitelinks

![overview over the sitelinks for Middlemarch](images/middlemarch-sitelinks.png)<!-- .element: style="height:320px;" -->

- Wikipedia sitelinks as part of the “Metrics of World Literature” (Robinson 2017), as “a simple measure of canonicity” (Kukkonen 2020)
- George Eliot: *Middlemarch* (26 sitelinks)
- Tolkien: *The Hobbit*; Carroll: *Alice’s Adventures in Wonderland*; Orwell: *Animal Farm* (all 98 sitelinks to date)

--

### Markers of Canonicity: QRank

![typing Middlemarch into the Wikipedia searchbox](images/middlemarch-wikipedia-searchbox.png)<!-- .element: style="height:300px;" -->

- page views of a Wikidata item (i.&nbsp;e. from Wikipedia, Wikivoyage, Wikibooks, etc.) are aggregated into a QRank score (https://qrank.wmcloud.org/), used for ranking search results
- usually dating 12 months back, generated occasionally with no clear timestamp
- *Middlemarch*’s rank is 449,328; *Nineteen Eighty-Four*’s is 5,547,853 (bigger number = more popular)

--

### “Best Novel” Effect: Middlemarch <br />(English Wikipedia)

![pageview analysis of the Middlemarch article on Wikipedia](images/middlemarch-pageviews-analysis.png)<!-- .element: style="height:440px;" -->

(source: [pageviews.wmcloud.org](https://pageviews.wmcloud.org/?project=en.wikipedia.org&platform=all-access&agent=user&redirects=0&start=2026-05-01&end=2026-05-31&pages=Middlemarch) – QRank will eventually be influenced, <br />but unclear when a new QRank version is published; sitelinks not affected)
<!-- .element: style="font-size:0.65em;" -->

--

### Other Popularity Measures: Goodreads

![Goodreads Listopia project of the Guardian 2026 list](images/goodreads.png)<!-- .element: style="height:340px;" -->

- Listopia lists: reading challenges<!-- .element: style="font-size:0.65em;" -->
- ⚠️ Goodreads is not a neutral source: founded in 2007, acquired by Amazon in 2013, no new public API keys issued since 2020; overwhelmingly Anglophone and contemporary-skewed; depends on books having English editions/ISBNs<!-- .element: style="font-size:0.65em;" -->
- <!-- .element: style="font-size:0.65em;" -->see also Hu et al.: Who decides what is read on Goodreads? Uncovering sponsorship and its implications for scholarly research. In: Big Data and Society. Vol. 12, issue 3 (2025). (doi:10.1177/20539517251359229)
- platform data are not direct proxies for cultural behaviour!<!-- .element: style="font-size:0.65em;" -->

## Some Sitelink Correlations

--

### Number of Sitelinks vs Publication Date

![correlation: Wikipedia sitelinks vs publication date (novels published past 1800, 98 of 100)](images/guardian_pubdate_vs_sitelinks_past_1800.png)<!-- .element: style="height:440px;" -->

<u>*The Guardian*’s 2026 list (all works post-1800 = 98 of the initial top 100 novels; data retrieved on 19 May 2026)</u> <br/>Weak downward trend: recent works enter the list but stay sitelink-poor (consistent with Bourdieu’s consecration-as-duration, although age alone could produce the same trend).
<!-- .element: style="text-align:left; font-size:0.65em;" -->

--

### Number of Sitelinks vs QRank

![correlation: Wikipedia sitelinks vs QRank (100 novels)](images/guardian_qrank_vs_sitelinks.png)<!-- .element: style="height:440px;" -->

<u>*The Guardian*’s 2026 list (initial top 100 novels; data retrieved on 19 May 2026)</u> <br/>Unsurprisingly, QRank and sitelinks are tightly coupled; the interesting cases are off the diagonal. Above the line: broad multilingual coverage that is little read. Below the line: heavily‑viewed articles existing in few languages (typically the large ones, English above all).
<!-- .element: style="text-align:left; font-size:0.65em;" -->

--

### No. of Sitelinks vs No. of Goodreads Ratings

![correlation: Wikipedia sitelinks vs number of Goodreads ratings (100 novels)](images/guardian_ratings_vs_sitelinks.png)<!-- .element: style="height:440px;" -->

<u>*The Guardian*’s 2026 list (initial top 100 novels; data retrieved on 19 May 2026)</u> <br/>Above the line: “more honoured than read”, broadly translated and catalogued, max. literary capital, min. popular-reading volume (Bourdieu’s autonomous pole; Casanova’s consecrated centre). Below the line: recent-to-mid-20th-century Anglophone works, central to the US/UK canon, assigned in schools/universities, boosted by adaptations and book-club circulation, yet comparatively under-translated into other-language Wikipedias. But Goodreads' Anglophone, ISBN-gated reach inflates this split.
<!-- .element: style="text-align:left; font-size:0.6em;" -->

## Lists, Lists, Lists

<br />

- Shane Sherman’s *The Greatest Books of All Time* collected 759 book lists so far ([thegreatestbooks.org](https://thegreatestbooks.org/))
- main goal is to create a meta-canon, a ranked “greatest books” list by aggregating many existing “best books” lists and weighting them by perceived quality/influence
- the ranking algorithm is open source ([github.com/ssherman/weighted_list_rank](https://github.com/ssherman/weighted_list_rank))
- using site-internal numeric IDs for lists, authors, books, but neither ready nor meant for scholarly purposes

--

## Canon Shelf

<br />

- use cases beyond “best books”: reading lists, mentions in literary histories, bestsellers, exhaustive lists of genres (i.&nbsp;e. German-language [one-act plays](https://einakter.dracor.org/), [bourgeois tragedies](https://github.com/lehkost/bgltr), and [novellas](https://github.com/julianschroeter/19CproseCorpus); [100-page books](https://www.umblaetterer.de/100-seiten/), [1,000-page books](https://www.umblaetterer.de/2014/10/21/tausendseiter/), etc.)
- not only books/novels, but all kinds of artistic works (music, paintings, etc.)
- enriched with identifiers of authority files and other projects that can be used as canon proxies, with Wikidata as the main broker
- provides data for the Canon Curator (see next slide)
- mid-term plan to establish a platform hosting all kinds of lists to support digital canon research

--

## Canon Curator

<br />

- automatised enrichments from various sources (with a focus on canon proxies)
- referencing sources and using timestamps, given that most of the values develop dynamically
- data model: JSON-LD and Turtle output builds on a number of ontologies and vocabularies: CANON, PROV and PAV, Basic Geo, Dublin Core Terms
