On 9 January 1886, John Lubbock, an English banker, Liberal politician, and polymath, delivered a lecture at the Working Men’s College in London <br />entitled _On the Pleasure of Reading_.

In the lecture, he recommended a selection of one hundred books <br />that he considered especially worth reading.

<!-- .element: class="fragment" -->

Two days later, _The Pall Mall Gazette_ reported on the lecture and helped popularise Lubbock’s selection as a list of the _Best Hundred Books_.

<!-- .element: class="fragment" -->

--

![Lubbock’s Best Hundred Books in a Pall Mall Gazette extra edition (1886)](images/1886_best-hundred-books-pall-mall-gazette.png)<!-- .element: style="height:440px;" -->

(via [Wikimedia Commons](<https://commons.wikimedia.org/w/index.php?title=File%3ALubbock_-_The_Best_Hundred_Books_(1886).pdf&page=17>))

<!-- .element: style="font-size:0.65em;" -->

--

In 1891, Jenkin Lloyd Jones, a prominent American Unitarian minister, published a small brochure entitled _Ten Great Novels_. The list was based on a survey conducted in 1884 and therefore predates Lubbock’s “best books.”

It received seventy responses, naming 147 different novels, including works originally written in languages other than English.

<!-- .element: class="fragment" -->

Ranked by number of votes, the winning titles were …

<!-- .element: class="fragment" -->

--

![page from Jenkin Lloyd Jones: Ten Great Novels (1891)](images/1891_ten-great-novels.png)<!-- .element: style="height:540px;" -->

(image source: [Google Books](https://books.google.com/books?id=a5xPAQAAMAAJ&pg=PA3))

<!-- .element: style="font-size:0.65em;" -->

--

In 1898, Clement K. Shorter published his list <br />_A Hundred Books for a Village Library._

In 1899, _The Daily Telegraph_ published <br />a list of the _100 Best Novels in the World._

<!-- .element: class="fragment" -->

In 1916, John Cowper Powys published <br />_One Hundred Best Books._

<!-- .element: class="fragment" -->

--

Between 1978 and 1980, German weekly _Die Zeit_ <br />published _Die ZEIT-Bibliothek der 100 Bücher._

In 1991, the Swedish literary magazine _Tidningen Boken_ published _Världsbiblioteket_, a list of the 100 best books in world literature.

<!-- .element: class="fragment" -->

At the end of the twentieth century, <br />“books of the century” lists proliferated …

<!-- .element: class="fragment" -->

--

In 1998, the _Modern Library_ listed the _100 Best Novels_, produced <br />with the “assistance of a distinguished Board made up of celebrated <br />authors, historians, critics, and publishing luminaries.”

In 1999, _Le Monde_ published _Les cent livres du siècle_, based <br />on a poll in which approximately 17,000 participants took part.

<!-- .element: class="fragment" -->

In 2001, the Spanish daily _El Mundo_ published <br />_Las 100 mejores novelas en castellano del siglo XX._

<!-- .element: class="fragment" -->

In 2005, _Time_ magazine published its _All-TIME 100 Novels_, a list of 100 English-language novels published since 1923 and selected by two _Time_ critics.

<!-- .element: class="fragment" -->

## Competency Questions

<br />

* Which is the most popular play by William Shakespeare?
* Which are the 10 most popular works according to Goodreads?
* How is the gender distribution of authors in the canon from 1930 to 1945?
* Which is the most popular work from Chile?
* How has the popularity of *Imperium* by Christian Kracht changed over time?

<br />More questions: [github.com/temporal-communities/canon-curator/wiki/Competency-questions-for-the-data-model](https://github.com/temporal-communities/canon-curator/wiki/Competency-questions-for-the-data-model)

<br />Use of Competency Questions in Ontology Engineering: [doi:10.1007/978-3-031-47262-6_3](https://doi.org/10.1007/978-3-031-47262-6_3)
<!-- .element: style="font-size: 0.65em;" -->

--

### Mapping questions to requirements

<br />

* R1: Assign persistent identifiers to authors, works and places, so the same entity is recognisable across canon lists
* R2: Represent competing claims about the same entity; link all claims to their source and retrieval history
* R3: Make gender directly queryable, _but be explicit about the basis on which it was claimed_
* R4: Make geographic origin directly queryable, _but distinguish author-level from work-level origin_
* R5: Represent popularity as canonicity metrics and provide each claim with a timestamp
* ...

--

<!-- .slide: class="list08" -->

### Infrastructural challenges regarding <br />gender data and geodata

<br />

<div class="fragment">

* Many data models inaccurately represent gender ([GND](https://gnd.network/Webs/gnd/EN/Home/home_node.html): “male”, “female”, “not known”)
* Sources are often unclear, nonexistent or hidden in PDF documentation with insufficient granularity
* Querying statement-level provenance is complicated and requires knowledge of the provenance representation
* May change over time (author changes gender identity, publishes in new country or language; new works appear)

</div>

<div class="fragment">

<br />To interpret this data, users have to know:
* How and when was it retrieved? (workflow-level provenance)
* How did the database from where it was derived define gender?
* Which primary source is it based on? (statement-level provenance)
</div>

--

### More requirements

<br />

* Two output formats:
  <!-- .element: class="fragment" -->
    <ul>
      <li>JSON Lines for quantitative analyses</li>
      <li>Turtle / JSON-LD for qualitative enquiry</li>
    </ul>
* Queries over the Turtle / JSON-LD output should return “**provenance by default**”, even when it is not directly queried
<!-- .element: class="fragment" -->
* Provenance should be tracked both on the workflow and statement levels
<!-- .element: class="fragment" -->
* Enrichment pipeline should be **modular** to allow users to select enrichment sources relevant to their questions
<!-- .element: class="fragment" -->
* Enrichment pipeline should be **reusable**, adaptable and extensible by researchers with limited coding experience
<!-- .element: class="fragment" -->
* All components should be **open source** and require minimal infrastructure
<!-- .element: class="fragment" -->

### Our approach

<br />

The Turtle / JSON-LD output is an interpretative aid for researchers, it is supposed <br />to represent the enrichment workflow and claims that were found during <br />an enrichment run in different source databases at a certain time.
<!-- .element: style="font-size: 0.85em;" -->

<br />

<ul>
  <li class="fragment" data-fragment-index="1">We can almost never assert “X’s gender is Y”, because the only authoritative source is X: we never know someone’s true gender unless they told us, recently</li>
  <li class="fragment" data-fragment-index="1">Recording it unasserted (“gender of X is Y, according to Z”) makes querying tricky, one of our core requirements</li>
  <li class="fragment" data-fragment-index="1">Asserting one claim forces us to pick a correct claim among competing claims with unreliable sources</li>
  <li class="fragment" data-fragment-index="2">Assert selfIdentifiedGender, recordedGender, assumedGender
    <ul>
      <li>many assumptions and records of one’s gender can coexist</li>
      <li>gender stays queryable and every query result carries a provenance signal by default</li>
    </ul>
  </li>
</ul>

### SPARQL Query Example

<style>
#sparql-slide pre {
  font-size: 0.5em;
}

#sparql-slide pre code {
  font-size: 1em;
  line-height: 1.25;
  max-height: none;
}
</style>

```sparql [1-2,7,9-13,26]
PREFIX canon: <https://github.com/temporal-communities/canon-curator/ontology/>
PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
PREFIX prov:  <http://www.w3.org/ns/prov#>
PREFIX pav:   <http://purl.org/pav/>

SELECT ?work ?p ?location 
       ?sourceDatabase ?primarySource ?sourceContext ?requestUrl ?agent ?retrievedAt
WHERE {

?work a canon:Work .
?p rdfs:subPropertyOf canon:geolocation .
?work ?p ?location .

<< ?work ?p ?location >> canon:hasEnrichment ?rec .

OPTIONAL { ?rec prov:generatedAtTime   ?retrievedAt }
OPTIONAL { ?rec prov:wasDerivedFrom    ?sourceDatabase }
OPTIONAL { ?rec prov:hadPrimarySource  ?primarySource }
OPTIONAL { ?rec pav:sourceAccessedAt   ?sourceContext }
OPTIONAL { ?rec pav:importedFrom       ?requestUrl }

OPTIONAL {
    ?rec prov:wasGeneratedBy ?act .
    ?act prov:wasAssociatedWith ?agent .
}
}
```

Parts highlighted are required.
