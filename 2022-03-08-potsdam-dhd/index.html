## Grenzen des Lesens
### Maximale Close-Reading-Korpusgrößen (Beispiele)

<br />

* Cornelia Mönch: [»Abschrecken oder Mitleiden. Das deutsche bürgerliche Trauerspiel im 18. Jahrhundert. Versuch einer Typologie«](https://doi.org/10.1515/9783110910612) (1993)
  * 242 Stücke
* Benjamin Herbst: [»Die Dramaturgie des Sterbens. Der Tod im deutschsprachigen Drama von 1768 bis 1849«](https://doi.org/10.18452/18921) (2018)
  * 509 Stücke

--

### Facetten digitaler Dramenforschung

<br />

* Hartmut Ilsemann: Computerized Drama Analysis (LLC 1995), [doi:10.1093/llc/10.1.11](https://doi.org/10.1093/llc/10.1.11)
  * DRAMALYS.EXE (zuerst 1984) und DRAMGRAF.EXE (für MS-DOS-Computer, geschrieben in Turbo Basic)
* Fotis Jannidis und Gerhard Lauer: [Burrows’s Delta and Its Use in German Literary History](http://www.jstor.org/stable/10.7722/j.ctt5vj848.5) (2014)
* Christof Schöch: [Topic Modeling Genre: An Exploration of French Classical and Enlightenment Drama](http://www.digitalhumanities.org/dhq/vol/11/2/000291/000291.html) (DHQ 2017)
* Mark Algee-Hewitt: Distributed Character: Quantitative Models of the English Stage, 1550–1900 (NLH 2017), [doi:10.1353/nlh.2017.0038](https://doi.org/10.1353/nlh.2017.0038)
* Nils Reiter, Tim Strohmayer, Janis Pagel: [DramaAnalysis](https://cran.r-project.org/web/packages/DramaAnalysis/index.html) (2019)

### Korpusarbeit

--

### **DraCor**

<br />

- DraCor: *Drama Corpora*-Portal (https://dracor.org/)
- [Credits](https://dracor.org/doc/credits)-Seite: &gt; 50 Namen
- Beginn mit zwei Hauskorpora:
  - German Drama Corpus, GerDraCor (1650er–1940er)
  - Russian Drama Corpus, RusDraCor (1740er–1940er)

--

### Voraussetzung: Kodierungsstandard TEI (1/2)

<br />

![Der Pudelhund (Snippet))](images/katzen-sprache.jpg)<!-- .element: style="height:300px;" -->

<br />

<small>Karl von Eckartshausen: *Der Pudelhund. Ein Lustspiel in einem Aufzuge.* München: Lentner 1800, S. 24. ([via Google Books](https://books.google.com/books?id=qF5IAAAAcAAJ&pg=PA24))</small>

--

### Voraussetzung: Kodierungsstandard TEI (2/2)

<br />

```xml
<sp who="#felden">
  <speaker>Felden.</speaker>
    <p>
      Wie viele Buchstaben hat denn das Alphabet der Katzen-Sprache?
    </p>
</sp>
<sp who="#anton">
  <speaker>Anton.</speaker>
    <p>
      Das will ich Ihnen erklären, denn der Herr Sprachmeister hat es mich
      schon gelehrt. Es hat nur 4 Buchstaben: M. I. A. U; das heißt: Miau.
      Aus diesen 4 Buchstaben formiren sich aber sämmtliche Wörter, und die
      Verschiedenheit der Töne, und die Geschwindigkeit des Ausdruckes oder
      das Aushalten der Sylben formirt die Wörter […]
    </p>
</sp>
```

<br />

<small>Dialog aus Karl von Eckartshausens Lustspiel »Der Pudelhund« (1800) in TEI (Text Encoding Initiative), Quelle: [DraCor](https://dracor.org/id/ger000524). Momentan sind im Standard 590 verschiedene Elemente definiert ([Stand August 2021](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).</small>

## DraCor-API

<br /><br />
<small>API: Application Programming Interface (Anwendungsschnittstelle)<br /><br />

--

### Was ist eine API?

<br />

- standardisierter Austausch von Informationen zwischen einer Anwendung und einzelnen Programmteilen
- modularisierte, vereinfachte Programmierung
- Übergabe von Daten erfolgt strukturiert nach einer definierten Syntax
- speziell: REST API (für Webservices)

--

### Funktionen der DraCor-API

![DraCor-API)](images/dracor-api.png)

<small>https://dracor.org/doc/api</small>

### Einfache Visualisierung von Strukturdaten
#### Anzahl von Figuren pro Stück in chronologischer Folge (1/2)

<br />

```R
library(data.table)
library(ggplot2)
gerdracor <- fread("https://dracor.org/api/corpora/ger/metadata.csv")
ggplot(gerdracor[], aes(x = yearNormalized, y = numOfSpeakers)) + geom_point()
```

<br />

<small>Beispiel für einfaches R-Script, das die Daten über die API bezieht.</small>

--

![Anzahl Figuren](images/num-of-speakers-gerdracor.png)

<small>Ausgabe in RStudio.</small>

<small>(Der Punkt rechts oben: Karl Kraus’ »Die letzten Tage der Menschheit«, 925 Sprechinstanzen).</small>

### API-Wrapper

<br />

= weitere Vereinfachung: <br />API-Funktionen bekommen eigene Befehle

<br />

- für R: rdracor
- für Python: PyDraCor
- für Haskell: HDraCor

--

#### Beispiel (mit rdracor):

```R
library(rdracor)
library(igraph)
hermann <- play_igraph(corpus="ger", play="kleist-die-hermannsschlacht")
plot(hermann)
```
