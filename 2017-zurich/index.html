### DARIAH is …

<br />

… the <br />DigitAl Research Infrastructure <br />for the Arts and Humanities, …<!-- .element: class="fragment" -->

<br />

… a pan-European community of researchers to <br />facilitate humanities research in the digital age.<!-- .element: class="fragment" -->

--

### Do the Humanities Need <br />Research Infrastructure?

--

#### Here is an infrastructure:

![A Library](images/historischer-bibliothekssaal.jpg)<!-- .element: style="width:740px;" -->

<small>(source pic: [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Historischer_Bibliothekssaal.JPG), CC-BY-SA-3.0)</small>

--

«All disciplines have infrastructural needs, for data, for specialist knowledge, for methodological support, for storage and processing power. The arts and humanities need shared research infrastructure as much as any other discipline.»

<br /><br />

<small>([PARTHENOS’ Leaflet to address Policy Makers](http://www.parthenos-project.eu/why-humanities-need-a-research-infrastructure/))</small>

--

### Some DARIAH-Driven Services

<br />

* [DARIAH-DE Repository](https://de.dariah.eu/repository) – Humanities research data
* [Open Archive HAL](https://hal.archives-ouvertes.fr/) – preprints and other scholarly documents
* [DH Course Registry](https://registries.clarin-dariah.eu/courses/) – together with CLARIN
* [Geo-Browser](https://geobrowser.de.dariah.eu/) – visualisation of spatio-temporal data
* [TextGrid](https://textgrid.de/en/) – scholarly editing
* [Hypotheses](http://hypotheses.org/about-hypotheses) – academic blogs in different languages
* [&#35;dariahTeach](https://www.youtube.com/channel/UCScSbG7XjiXbZVgilEp0Pkw) – YouTube channel with how-tos
* [TERESAH](http://teresah.dariah.eu/) – registry of digital tools for the arts &amp; humanities
* [«Doing Digital Humanities»](https://www.zotero.org/groups/113737/doing_digital_humanities_-_a_dariah_bibliography) – curated DH bibliography with 1,115 articles (as of 18 Dec 2017)

--

### Working Groups …

… are the backbone of DARIAH; we have [22 working groups](https://www.dariah.eu/activities/working-groups-list/) at the moment, among which:

* Text and Data Analytics<!-- .element: style="font-size:0.85em;" -->
* Visual Media and Interactivity<!-- .element: style="font-size:0.85em;" -->
* Training and Education<!-- .element: style="font-size:0.85em;" -->
* Digital Methods and Practices Observatory (DiMPO)<!-- .element: style="font-size:0.85em;" -->
* Lexical Resources<!-- .element: style="font-size:0.85em;" -->
* Community Engagement<!-- .element: style="font-size:0.85em;" -->
* Digital Annotation<!-- .element: style="font-size:0.85em;" -->
* Image Science and Media Art Research<!-- .element: style="font-size:0.85em;" -->
* Medievalist’s Sources<!-- .element: style="font-size:0.85em;" -->
* Guidelines and Standards (GiST)<!-- .element: style="font-size:0.85em;" -->
* …<!-- .element: style="font-size:0.85em;" -->

--

### Some of Our High-Level Principles

<br />

* community-driven ([22 working groups](https://www.dariah.eu/activities/working-groups-list/) at the moment)
* inclusive (addressing the humanities as a whole, not the *digital* humanities in particular)
* promoting openness ([Open Science Officer](https://www.dariah.eu/2017/11/20/dariah-seeks-an-open-science-officer-based-in-our-berlin-offices/))
* enabling transnational collaboration
* promoting standards and best practices
* delivering easy-to-use services and resources
* strong focus on teaching and training (as an example: [recent workshops addressing the German-language community](https://de.dariah.eu/veranstaltungen))

--

### DARIAH History

<br />

* 2006: DARIAH appears on ESFRI Roadmap
* 2008–2011: Preparatory Phase
* 2011–2013: Transition Phase
* 2014: DARIAH-ERIC
* 2014–2018: Construction Phase
* 2019–: Operational Phase

### Moving Forward Strategically

<br />

- in early November 2017, the General Assembly approved the DARIAH Action Plan
- 25 key actions for a stronger DARIAH by 2020, among which:
  - populating the DARIAH Open Marketplace
  - enhancing profile in training/education
  - supporting and promoting research communities through the DARIAH Working Groups and other structures
- download the Action Plan: [PDF (230 kB)](https://www.dariah.eu/wp-content/uploads/2017/02/DARIAH_STRAPL_v06112017.pdf)
