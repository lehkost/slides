# Chapter 1.

### 'Research Infrastructure'

--

### DARIAH

### Do the Humanities Need <br />Research Infrastructure?

--

#### Here is an infrastructure:

![A Library](images/historischer-bibliothekssaal.jpg)<!-- .element width="740px;" -->

<small>(img source: [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Historischer_Bibliothekssaal.JPG), CC-BY-SA-3.0)</small>

### The Very Origins of Research <br />Infrastructures (RIs) in the Humanities

<br />
"[I]t is worth noting that it was in the field of Humanities that the idea of an RI was first born, […] as early as the 3rd century B.C., […] in the form of the *Mouseion*, a cultural centre, university and library founded in Alexandria under the successors of Alexander the Great[.]"

<br />
<small>Marja Makarow et al. (eds.): Research Infrastructures in the Digital Humanities. ESF Report, Sept. 2011. ([PDF](http://archives.esf.org/fileadmin/Public_documents/Publications/spb42_RI_DigitalHumanities.pdf))</small>

--

## What do we mean by Research Infrastructures?

<br />
- national and international scale investments in shared research capability that go beyond what any single institution (or even nation) can support
- dramatically increase scientific reach
- address research questions of long duration 
requiring pooled effort
- promote collaboration, interdisciplinarity, interaction with industry

<br />
<small>Quoted from John Womersley's talk at [ICRI 2018](https://www.icri2018.at/) in Vienna, 12 Sep 2018.</small>

--

### Why the Humanities Need an RI

<br />
"All disciplines have infrastructural needs, for data, for specialist knowledge, for methodological support, for storage and processing power. The arts and humanities need shared research infrastructure as much as any other discipline."

<br /><br />
<small>([PARTHENOS’ leaflet to address policy makers](http://www.parthenos-project.eu/why-humanities-need-a-research-infrastructure/))</small>

* 2014–2018: Construction Phase

# Chapter 3.

<br />
### DARIAH: Abstract Principles <br />and Concrete Activities

--

## DARIAH Does/Is Four Things

<br />
* Education and Training​
 * complement traditional training with corresponding material and alternative teaching methods (workshops, summer schools, hackathons, etc.)<!-- .element: style="font-size:0.8em;" -->
* The (future) Marketplace
 * enable access to research solutions (tools, services, data, workflows, know-how), also aiming at researchers who don't regard themselves as<!-- .element: style="font-size:0.8em;" --> *digital* humanists
* Foresight and Policy Work
 * making the voice of the A+H heard in research policy discussions, promote nascent policies to our communities<!-- .element: style="font-size:0.8em;" -->
* Working Groups
 * see next slide<!-- .element: style="font-size:0.8em;" -->

--

### Some of Our High-Level Principles

<br />
* community-driven (working groups)
* inclusive (addressing the humanities as a whole, not the *digital* humanities in particular)
* promoting openness (full-time Open Science Officer)
* enabling transnational collaboration
* promoting standards and best practices
* strong focus on teaching and training
* delivering easy-to-use services, resources, solutions

--

### Some DARIAH-Driven Services

* Single Sign-On
* [DH Course Registry](https://registries.clarin-dariah.eu/courses/) – together with CLARIN
* [Open Archive HAL](https://hal.archives-ouvertes.fr/) – preprints and other scholarly documents
* [Geo-Browser](https://geobrowser.de.dariah.eu/) – visualisation of spatio-temporal data
* [TextGrid](https://textgrid.de/en/) – scholarly editing
* [Hypotheses](http://hypotheses.org/about-hypotheses) – academic blogs in different languages
* &#35;dariahTeach – [teaching and training platform](https://teach.dariah.eu/) with peer-reviewed material plus [YouTube channel](https://www.youtube.com/channel/UCScSbG7XjiXbZVgilEp0Pkw)
* [TERESAH](http://teresah.dariah.eu/) – registry of digital tools for the arts &amp; humanities
* [DARIAH-DE Repository](https://de.dariah.eu/repository) – Humanities research data
* ["Doing Digital Humanities"](https://www.zotero.org/groups/113737/doing_digital_humanities_-_a_dariah_bibliography) – curated DH bibliography with 1,116 articles (as of 13 Sep 2018)

### European Open Science Cloud (EOSC)

<br />
- general cloud for research data of all fields
- EOSC Declaration (October 2017)
- data culture, open access, data stewardship, FAIR principles, standards, data management plans, technical implementations, legal aspects
- DARIAH together with CLARIN and other partners representing the Humanities/SSH
