## Kapitel 7.

<br />

### Pfade der Weltliteratur

--

### Ziel: ein *Observatory of World Literature*

<br />

- modelliert als komplexes Netzwerk (Autor\*innen, Werke, Figuren, Epitexte, Forscher\*innen, Leser\*innen, community-at-large)
- die Maschine nicht als Zweck, sondern als Mittel
- Stärkung komparatistischer Ansätze
- Scalable Reading: von Einzelwerken zu Korpora und zurück
- eine digitale Literaturwissenschaft, die nachhaltig und einfach nachvollziehbar ist und bestehende Methoden ausbaut und ergänzt
