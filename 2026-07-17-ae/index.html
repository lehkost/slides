## 2
### Die API der Arendt-Edition

--

### Was ist TEI-XML?

- [Text Encoding Initiative](https://tei-c.org/) (seit 1987): Kodierung von Texten inkl. struktureller und semantischer Informationen
- XML-Standard (seit 1998): lesbar von Menschen und Computern, Metastandard für verschiedene Formate und Auszeichnungssprachen
- Es können individuelle Schemas definiert werden: z.B. für
Bücher, Gedichte, Theaterstücke, Wörterbücher
- Bei Hannah Arendt die Grundlage für die Webapplikation und die API der Digitalen Edition

<br />
<br />

--

### Ausschnitt TEI-XML Varnhagen-Text


    <div type="chapter" n="Hinein in die Welt">
        <head type="mainHeading">
            Hinein in die Welt
            <lb>1795-1799
        </head>
        <div type="subChapter" n="I. Durch Heirat">
            <head type="subHeading">
                I. Durch Heirat
            </head>
            <p>
                Im Winter des Jahres 1795 sieht
                <name ref="#ae3807426" type="person">Rahel</name>
                aus ihrer Theaterloge den Grafen
                <name ref="#ae7149345" type="person">Karl von Finckenstein</name>.
                ...
            </p>
            ...
        </div>
        ...
    </div>


Hierarchische Struktur, Kodierung von strukturellen und semantischen Informationen

--

### Was ist eine API?

- Die Benutzerschnittstelle (User Interface) einer Webanwendung
hat Seiten, Text, Links, Tabellen, Formulare, Buttons usw.
- Sprache: HTML, Software: Webbrowser (Firefox, Chrome)
- Eine API (wörtlich *Schnittstelle zur Programmierung von Anwendungen)*
hat Endpunkte/URLs, Argumente, Rückgabewerte, Fehlercodes usw.
- Sprache: JSON oder XML nach dem Prinzip Anfrage -> (Daten-)Antwort
- Software: Python- oder R-Skripte, Juypter-Notebooks oder andere Server wie z.B.
Metadaten-Aggregatoren
- User: Entwickler und Digital Humanists

--

### Die API der Arendt-Edition

- seit letzter Woche Beta-Version (V0.1.0)
- die Endpunkte sind vorerst auf die Abfrage von Daten zu Personen und Textressourcen beschränkt
- für Textressourcen ist jetzt die Rückgabe der TEI-XML-Quelle und die Extraktion von Plain Text implementiert
- https://test.hannah-arendt-edition.net/exist/apps/sade-Arendt/api.html

### Stand der API-Entwicklung

<br />

- zu Demonstrationszwecken sind derzeit Endpunkte zu erwähnten Personen und den TEI-kodierten Texten angelegt
- weitere Funktionen mit interessanten Forschungsperspektiven müssen wir gemeinsam entwickeln
- auf den folgenden Folien finden sich zwei beispielhafte Visualisierungen, die demonstrieren, wir wir dank Normdatenmapping von Entitäten wie Personen, Orten und Werken Informationen nutzen können, die von der AE selbst gar nicht ausgezeichnet werden

## 4
### What’s next

--

- es geht nicht um Quantifizierungen (vgl. Zitat von Tomashevsky)
- kann sich die Perspektive des Lesens durch API-Zugänge ändern?
- Was wären interessante Fragestellungen, für die die API entsprechende Daten herausgeben könnte?
- Jupyter Notebooks, Open Educational Resource, die mit der API vertraut macht, um eigene digitale Forschungsszenarien zu entwickeln
- [Beispiel eines Jupyter Notebooks](https://quadriga-dk.github.io/Text-Fallstudie-1/ocr/ocr_jupyter_intro.html) innerhalb einer OER
