## 2
### Die API der Arendt-Edition

--

- TEI-XML, darin sind Annotationen (Beispielsatz zeigen)
- Was sind Normdaten? (GND, Wikidata)
- Beispiel: https://hannah-arendt-edition.net/index/persons/person?id=ae3807426&lang=de
- Was ist eine API?
- die API der AE
  - seit letzter Woche Beta-Version (V0.1.0)
  - die Endpoints sind vorerst auf die Abfrage von Daten zu Personen und Textressourcen beschränkt
  - für Textressourcen ist jetzt die Rückgabe der TEI-XML-Quelle und die Extraktion von Plain Text implementiert
  - https://test.hannah-arendt-edition.net/exist/apps/sade-Arendt/api.html

--

### Swagger-Interface der API

![API der AE](images/api-ae.png)

([Zugang zur API 0.1.0](https://test.hannah-arendt-edition.net/exist/apps/sade-Arendt/api.html), nur über Uni-VPN.)
<!-- .element: style="font-size:0.65em;" -->

### Stand der API-Entwicklung

<br />

- zu Demonstrationszwecken sind derzeit Endpunkte zu erwähnten Personen und den TEI-kodierten Texten angelegt
- weitere Funktionen mit interessanten Forschungsperspektiven müssen wir gemeinsam entwickeln
- auf den folgenden Folien finden sich zwei beispielhafte Visualisierungen, die demontrieren, wir wir dank Normdatenmapping von Entitäten wie Personen, Orten und Werken Informationen nutzen können, die von der AE selbst gar nicht ausgezeichnet werden

## 3
### Perspektiven: »Programmable Corpora«

--

- Bsp. DraCor, Einfluss einer API auf die Forschungsaktivität

--

### DraCor-basierte Forschung

<br />

- seit Anfang 2024 wurden über 100 DraCor-basierte Forschungsarbeiten veröffentlicht (inkl. Monografien)
- siehe [dracor.org/doc/research](https://dev.dracor.org/doc/research)

--

- Nutzung von APIs in DSE
  - Bleier, Roman and Klug, Helmut W. (2018). Discussing Interfaces in Digital Scholarly Editing. In: Digital Scholarly Editions as Interfaces, V-XV. Norderstedt: BoD. ISBN 978-3-7481-0925-9 [Open Access] – https://kups.ub.uni-koeln.de/9094/
  - Nutzung der API-Funktionen über die Präsentationsschicht hinaus
  - wer hat das Primat bei DSE: GUI oder API?
  - API von DSE bisher nur selten über die GUI hinaus, für Forschungsfragen, genutzt

---

## 4
### What’s next

--

- es geht nicht um Quantifizierungen (vgl. Zitat von Tomashevsky)
- kann sich die Perspektive des Lesens durch API-Zugänge ändern?
- Was wären interessante Fragestellungen, für die die API entsprechende Daten herausgeben könnte?
- Jupyter Notebooks, Open Educational Resource, die mit der API vertraut macht, um eigene digitale Forschungsszenarien zu entwickeln
- [Beispiel eines Jupyter Notebooks](https://quadriga-dk.github.io/Text-Fallstudie-1/ocr/ocr_jupyter_intro.html) innerhalb einer OER
