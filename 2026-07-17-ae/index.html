## 1
### Einführung

--

### Unsere Aufgabe innerhalb der dritten Förderphase (2026–2029)

<br />

Das Arbeitspaket XIII (Datenschnittstellen für die Digital Humanities) ermöglicht die konkrete Nachnutzung der semantisch ausgezeichneten <br />Daten der Arendt-Edition über eine gut dokumentierte Schnittstelle.

--

### Drei Teilaspekte des Arbeitspakets XIII

<br />

1. Entwicklung eines interaktiven Tutorials zur Nutzung der externen Datenschnittstelle (API), die im Arbeitspaket XII bereits technisch dokumentiert wird;
2. Umsetzung konkreter Analysen in Jupyter Notebooks (»papers with code«), mit einem Fokus auf erläuternden Kommentaren, sodass der verwendete Programmcode leicht angepasst und für individuelle Anwendungen eingesetzt werden kann;
<!-- .element: class="fragment" -->
3. Erstellung einer Fallstudie als OER (Open Educational Resource), die sich am Kompetenzframework des Berlin-Brandenburgischen Datenkompetenzzentrums [QUADRIGA](https://www.quadriga-dk.de/) orientiert.
<!-- .element: class="fragment" -->

### Was sind Jupyter Notebooks?

<br />

- interaktive Notebooks, in deren Fließtext direkt Code ausgeführt werden kann
  - Beispiel: [Kapitel 4.3](https://quadriga-dk.github.io/Text-Fallstudie-1/ocr/ocr_jupyter_intro.html) der QUADRIGA-Fallstudie »Quantitative Analyse der Medienwellen der Spanischen Grippe (1918/19)«

--

### Jupyter Notebooks als Zukunft <br />wissenschaftlichen Publizierens

<br />

* James Somers: The Scientific Paper Is Obsolete. Here’s what’s next. In: The Atlantic, 5. April 2018. (**[URL](https://www.theatlantic.com/science/archive/2018/04/the-scientific-paper-is-obsolete/556676/)**)

--

### Eine Vorbemerkung zum »epistemischen <br />Ding« der Digital Humanities

<br />

- Forschung richtet sich nie auf ›natürliche Objekte‹, sondern auf ›epistemische Dinge‹
- das sind »Dinge, denen die Anstrengung des Wissens gilt« ([Rheinberger 2001](https://www.wallstein-verlag.de/9783892444541-experimentalsysteme-und-epistemische-dinge.html), S. 24)
- sie entstehen erst in einem spezifischen Repräsentationsraum, eingebettet in einen Kontext aus Praktiken, Standards und Werkzeugen
- die API als Teil des Repräsentationsraums entscheidet mit darüber, was überhaupt zum epistemischen Ding werden und wie es befragt werden kann; jede Modellierung ist zugleich Ermöglichung und Ausschluss
- die Jupyter Notebooks machen den Übergang vom Text zum Datum sicht- und nachvollziehbar, damit auch kritisierbar (vgl. [Trilcke/Fischer 2018](https://doi.org/10.17175/sb003_003))

## 2
### Die API der Arendt-Edition

--

### Was ist TEI-XML?

<br />

- [Text Encoding Initiative](https://tei-c.org/) (seit 1987): Kodierung von Texten inkl. struktureller und semantischer Informationen
- XML-Standard (seit 1998): lesbar von Menschen und Computern, Metastandard für verschiedene Formate und Auszeichnungssprachen
- Es können individuelle Schemas definiert werden: z.&nbsp;B. für Bücher, Gedichte, Theaterstücke, Wörterbücher
- Beim Arendt-Projekt ist TEI-XML die Grundlage für die Webapplikation und die API

--

#### Ausschnitt der TEI-XML-Kodierung des Varnhagen-Texts

<br />

```xml
<div type="chapter" n="Hinein in die Welt">
    <head type="mainHeading">
        Hinein in die Welt
        <lb>1795-1799
    </head>
    <div type="subChapter" n="I. Durch Heirat">
        <head type="subHeading">
            I. Durch Heirat
        </head>
        <p>
            Im Winter des Jahres 1795 sieht
            <name ref="#ae3807426" type="person">Rahel</name>
            aus ihrer Theaterloge den Grafen
            <name ref="#ae7149345" type="person">Karl von Finckenstein</name>.
            ...
        </p>
        ...
    </div>
    ...
</div>
```

<br />

Hierarchische Struktur, Kodierung von strukturellen und semantischen Informationen.

### Was sind Normdaten?

<br />

- Freie Vergabe von Kategorien wie *Rahel Varnhagen* ist fehleranfällig (unterschiedliche Schreibweisen,
Tippfehler, Ambiguitäten)
- Eigene Identifikatoren wie *ae3807426* lösen diese Probleme innerhalb des eigenen Systems, haben
außerhalb aber keine Bedeutung
- Normdaten-Anbieter (Normdatei oder Authority file) stellen Identifikatoren zur Verfügung, auf die
andere Systeme sich beziehen können
- https://d-nb.info/gnd/118626175 (GND – Gemeinsame Normdatei)
- https://www.wikidata.org/wiki/Q61793 (Wikidata)
- viele weitere...

--

![Webseite des GND-Eintrags](images/gnd-webseite.png)<!-- .element: style="height:480px;" -->

Webseite des GND-Eintrags für Rahel Varnhagen
<!-- .element: style="font-size:0.65em;" -->

--

- Normdaten-Anbieter verzeichnen weitere Information über ihre Einträge,
z.B. Geburtsdatum, Geburtsort, Gender
- Außerdem werden Beziehungen zu anderen Einträgen in einem Wissensgraphen
(Knowledge Graph) festgehalten, z.B. Verknüpfungen zu anderen Personen
als *mother, father, sibling, spouse*
- Dadurch muss ich als Anbieter nicht alle Informationen in meinem eigenen
System vorhalten.

![GND-Daten](images/gnd-daten.png)<!-- .element: style="height:200px;" -->

Die Arendt-Edition hält selbst nur wenige Informationen über Einträge im
Personenregister vor.
<!-- .element: style="font-size:0.65em;" -->

--

### Was ist eine API?

API: wörtlich *Schnittstelle zur Programmierung von Anwendungen*

<br />

|               | Webanwendung                                      | Web-API                                               |
|---------------|---------------------------------------------------|-------------------------------------------------------|
| Schnittstelle | Seiten, Text, Links, Tabellen, Formulare, Buttons | Endpunkte/URLs, Argumente, Rückgabewerte, Fehlercodes |
| Sprache       | HTML                                              | XML, JSON                                             |
| Software      | Webbrowser (Firefox, Chrome, Safari)              | Python-Skripte, Jupyter-Notebooks, andere Server      |
| Benutzer      | Jeder                                             | Digital Humanists, Entwickler                         |

<br />

„An API is a web interface for software“ (Arnaud Lauret, The Design of Web APIs)
<!-- .element: style="font-size:0.875em;" -->

<br />

<br />

»Man darf nicht vergessen, dass auch bei einer korrekt durchgeführten Zählung als Ergebnis eine Zahl entsteht, die nur die Gebräuchlichkeit beziehungsweise Häufigkeit des Phänomens kennzeichnet, keineswegs aber seine Qualität.«

## 3
### »Programmable Corpora«

--

### Am Beispiel von DraCor

![DraCor-Frontpage am 26.06.2026](images/dracor-frontpage-2026-06-26.png)<!-- .element: style="width:980px;" -->

[dracor.org](https://dracor.org/)

--

### Was sind »Programmable Corpora«?

<br />

- Begriff eingeführt in [Fischer et al. 2019](https://doi.org/10.5281/zenodo.4284002)
- Korpora nicht nur als Volltextdownloads betrachten, sondern als Forschungsökosystem, das sich um eine API herum organisiert
- abgefragt werden nicht Dateien, sondern maßgeschneiderte Ausschnitte extrahierter Daten
- die Daten bleiben offen (TEI-XML auf GitHub, freie Lizenz), aber die API liefert zusätzlich das, was aus dem TEI abgeleitet werden kann: Metadaten, spezifische Textschichten, Netzwerkdaten, Volltexte
- ergänzt um einen SPARQL-Endpunkt, der Entitäten wie Autor\*innen, Werke und Figuren an die Linked-Open-Data-Cloud anschließt

--

### Forschungsbeispiel

#### Epifizierungstendenzen im deutschsprachigen Drama, <br />untersucht anhand von Regieanweisungen

![Historische Verteilung bestimmter Wortarten in Regieanweisungen](images/stage-directions-historical-distribution-for-selected-pos.png)

Peer Trilcke, Christopher Kittel, Nils Reiter, Daria Maximova, Frank Fischer: <br />**[Opening the Stage: A Quantitative Look at Stage Directions in German Drama.](https://dh2020.adho.org/wp-content/uploads/2020/07/337_OpeningtheStageAQuantitativeLookatStageDirectionsinGermanDrama.html)** <br />In: DH2020: »carrefours/intersections«. Book of Abstracts. University of Ottawa.
<!-- .element: style="font-size:0.65em;" -->

--

#### Beispiel (mit rdracor, dem DraCor-API-Wrapper für R)

```R
library(rdracor)
library(igraph)
hermann <- get_net_cooccur_igraph(corpus="ger", play="kleist-die-hermannsschlacht")
plot(hermann)
```
… visualisiert für jedes beliebige Stück einen Ko-Okkurrenz-Graph …
<!-- .element: style="font-size:0.6em; margin-top:2.5em;" -->

![Hermannsschlacht, Netzwerkgraph mit rdracor](images/hermannsschlacht-rdracor-graph.png)<!-- .element: style="height:340px;" -->

… und ermöglicht einen → [Vergleich im Distant-Reading-Modus](https://doi.org/10.6084/m9.figshare.31113820)
<!-- .element: style="font-size:0.6em;" -->

--

### Rolle der API in der Forschung

<br />

- die API bringt die Inhalte der Korpora näher an konkrete Forschung und macht diese reproduzierbar
- seit Anfang 2024 wurden über 100 DraCor-basierte Forschungsarbeiten veröffentlicht (inkl. Monografien)
- siehe [dracor.org/doc/research](https://dev.dracor.org/doc/research)

## 4
### Perspektiven

--

### »Digital Scholarly Editions as Interfaces«

<br />

- [Open Access-Sammelband](https://www.i-d-e.de/publikationen/schriften/bd-12-interfaces/) (2018)
- das Primat liegt nicht bei GUI oder API, sondern beim Datenmodell, das beide trägt ([Bleier/Klug 2018](http://nbn-resolving.de/urn:nbn:de:hbz:38-90942), [Cayless 2018](http://nbn-resolving.de/urn:nbn:de:hbz:38-91191))
- die API ist kein Zusatzfeature, sondern die Bedingung dafür, dass eine Edition mehr als eine Lesart ihrer selbst zulässt ([Witt 2018](http://nbn-resolving.de/urn:nbn:de:hbz:38-91182))

--

### Ausblick

<br />

- Können sich durch die API neue Perspektiven des Lesens ergeben?
- Was wären interessante Fragestellungen, für die geeignete Daten über die API ausgegeben werden können?
- Die Entwicklung der API erfordert einen stetigen Austausch zwischen allen Arbeitspaketen der Edition und mit der internationalen Community.
