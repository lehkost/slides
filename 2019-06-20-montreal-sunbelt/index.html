### Extraction of Literary Network Data: <br />A „Digital Spectator“

<br />
- following an idea of Solomon Marcus, „Poetica matematică“, 1970
- operationalisation of ‘interaction’: <br />„Two characters interact with one another if they perform a speech act within the same segment of a drama (usually a ‘scene’).“

## **DraCor**

<br />
- DraCor: Drama Corpora Platform (https://dracor.org/)
- DraCor is a showcase for the concept of „Programmable Corpora“
- Programmable Corpora: collection of full-text literary corpora with an API and Linked Open Data

--

## Frontend dracor.org

![DraCor-Frontpage)](images/dracor-frontpage.png)<!-- .element: style="width:840px;" -->

<small>https://dracor.org/ (public beta!)</small>

## Connected Corpora

<br />
- German, Russian, Spanish, Swedish, Italian, Shakespeare, Ancient Greek, Roman, …
- full texts encoded in TEI (XML standard format in the Humanities, ~ 550 elements for the encoding of documents)
- example: [Shakespeare’s „Hamlet“](https://dracor.org/shake/hamlet)

## DraCor API

<br />

- character constellations per segment (*dynamic graphs!*)
- spoken text (all characters, only female/male, or per character)

## Catching Protagonists: <br />Quantitative Dominance Relations

## What Are „Quantitative Dominance Relations“?

<br />
- term coined by Manfred Pfister (1977)
- modelled by us as multi-dimensional vector of network- and word-based features

--

## Calculation of Rankings for 8 Measures <br />(For Every Character in Every Play)

**5 network-based**:<!-- .element: style="font-size:0.9em;" -->
- <!-- .element: style="font-size:0.9em;" -->Degree
- <!-- .element: style="font-size:0.9em;" -->Weighted degree
- <!-- .element: style="font-size:0.9em;" -->Closeness centrality
- <!-- .element: style="font-size:0.9em;" -->Betweenness centrality
- <!-- .element: style="font-size:0.9em;" -->Eigenvector centrality

**3 word-based**:<!-- .element: style="font-size:0.9em;" -->
- <!-- .element: style="font-size:0.9em;" -->Number of words
- <!-- .element: style="font-size:0.9em;" -->Number of speech acts
- <!-- .element: style="font-size:0.9em;" -->Number of appearances

--

## Ranking Results

<br />
- for &gt; 50% of plays, a definite *quantitative* main character is identified, ranking first in at least 7 of the 8 measures (in Russian and German Drama Corpus)
- yet literary texts can have more than one definite protagonist

--

## Major and Minor Characters

<br />
- division into **four groups** (following „Reallexikon der deutschen Literaturwissenschaft“, 2003):
  - I. main characters
  - II. secondary characters
  - III. marginal characters
  - IV. functional characters
- using ```cut``` function (in R)
