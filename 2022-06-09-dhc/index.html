## Schnittstellen und programmierbare Korpora

<br /><br />

<small>API: Application Programming Interface (Anwendungsschnittstelle)<br /><br />

--

### Qu’est-ce qu’une API ?

<br />

- standardisierter Austausch von Informationen zwischen einer Anwendung und einzelnen Programmteilen
- modularisierte, vereinfachte Programmierung
- Übergabe von Daten erfolgt strukturiert nach einer definierten Syntax
- speziell: REST API (für Webservices)

--

### Einfache Visualisierung von Strukturdaten
#### Anzahl von Figuren pro Stück in chronologischer Folge (1/2)

<br />

```R
library(data.table)
library(ggplot2)
gerdracor <- fread("https://dracor.org/api/corpora/ger/metadata.csv")
ggplot(gerdracor[], aes(x = yearNormalized, y = numOfSpeakers)) + geom_point()
```

<br />

<small>Beispiel für einfaches R-Script, das die Daten über die API bezieht.</small>

--

#### Anzahl von Figuren pro Stück in chronologischer Folge (2/2)

![Anzahl Figuren](images/num-of-speakers-gerdracor.png)

### API-Wrapper

<br />

= weitere Vereinfachung: <br />API-Funktionen bekommen eigene Befehle

<br />

- für R: rdracor
- für Python: PyDraCor
- für Haskell: HDraCor

--

#### Beispiel (mit rdracor):

```R
library(rdracor)
library(igraph)
hermann <- play_igraph(corpus="ger", play="kleist-die-hermannsschlacht")
plot(hermann)
```
