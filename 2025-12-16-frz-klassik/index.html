### Voraussetzung: TEI-Kodierungsstandard (2/2)

```
<sp who="#antoine">
  <speaker>ANTOINE.</speaker>
  <l part="I">Brutus ! il se pourroit.....</l>
</sp>
<sp who="#cesar">
  <speaker>CÉSAR.</speaker>
  <l part="F">Ne m’en crois pas. Tiens, lis.</l>
</sp>
<sp who="#antoine">
  <speaker>ANTOINE.</speaker>
  <l>Dieux ! La Sœur de Caton ! La fière Servilie !</l>
</sp>
<sp who="#cesar">
<speaker>CÉSAR.</speaker>
  <l>Par un hymen secret, elle me fut unie.</l>
  <l>Ce farouche Caton dans nos premiers débats,</l>
  <l>La fit presqu’à mes yeux, passer en d’autres bras :</l>
  <l>Mais le jour qui forma ce second hyménée,</l>
  <l>De son nouvel Époux trancha la destinée.</l>
  <l>Sous le nom de Brutus mon fils fut élevé.</l>
  <l>Pour me haïr, ô Ciel ! étoit-il réservé !</l>
  <l>Mais lis, tu sauras tout par cet Écrit funeste.</l>
</sp>
```

Dialog aus Voltaires Tragödie “La Mort de César”, kodiert in TEI (**T**ext **E**ncoding **I**nitiative). <br />Derzeit sind 588 verschiedene Elemente im Standard definiert ([Stand September 2025](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).

### Qu’est-ce qu’une API ?

<br />

- API: Application Programming Interface (Programmierschnittstelle)
- standardisierter Informationsaustausch zugunsten modularer, vereinfachter Programmierung
- Daten werden strukturiert nach einer definierten Syntax übertragen

### Einfache Visualisierung von Strukturdaten
#### Anzahl der Figuren pro Stück in chronologischer Reihenfolge (1/2)

<br />

```R
library(data.table)
library(ggplot2)
fredracor <- fread("https://dracor.org/api/v1/corpora/fre/metadata/csv")
ggplot(fredracor[], aes(x = yearNormalized, y = numOfSpeakers)) + geom_point()
```

<br />

Beispiel eines einfachen R-Skripts, das Daten über die API bezieht.

## Kapitel 2.1: Volltextdaten

<br />

### Voyant

--

### Aufgabe

<br />

- Öffne Voyant in einem anderen Browser-Tab (https://voyant-tools.org/).
- Wähle ein DraCor-Stück und gehe zum Download-Tab. (Beispiel: [Bérénice](https://dracor.org/id/fre001190#downloads))
- Downloade den ›Spoken text‹ → ›Plain (no markup)‹ → TXT.
- Du kannst auch die URL kopieren.
- Dann kannst du den Text oder die URL einfügen oder die Datei zu Voyant hochladen.

--

<!-- .slide: data-background-color="lightblue" -->

## Kapitel 2.2: Tabellarische Daten

<br />

### RAWGraphs

--

### Aufgabe

<br />

- Öffne RAWGraphs in einem anderen Browser-Tab (https://www.rawgraphs.io/).
- Wähle ein DraCor-Stück und gehe zum Download-Tab. (Beispiel: [Bérénice](https://dracor.org/id/fre001190#downloads))
- Downloade die ›List of characters‹ → ›Including precalculated data‹ → CSV.
- Du kannst auch die URL kopieren.
- Dann kannst du den Text oder die URL einfügen oder die Datei zu RAWGraphs hochladen.

--

<!-- .slide: data-background-color="lightblue" -->

## Kapitel 2.3: Tabellarische Daten

<br />

### Datawrapper

--

### Aufgabe

<br />

- Öffne Datawrapper in einem anderen Browser-Tab (https://www.datawrapper.de/).
- Wähle ein DraCor-Stück und gehe zum Download-Tab. (Beispiel: [Bérénice](https://dracor.org/id/fre001190#downloads))
- Downloade die ›List of characters‹ (Figurenliste) → ›Including precalculated data‹ → CSV.
- Du kannst auch die URL kopieren.
- Dann kannst du den Text oder die URL einfügen oder die Datei zu Datawrapper hochladen.

--

<!-- .slide: data-background-color="lightblue" -->

## Kapitel 2.4: Netzwerkdaten

<br />

### Gephi Lite

--

### Aufgabe

<br />

- Öffne Gephi Lite in einem anderen Browser-Tab (https://gephi.org/gephi-lite/).
- Wähle ein DraCor-Stück und gehe zum Download-Tab. (Beispiel: [Bérénice](https://dracor.org/id/fre001190#downloads))
- Downloade die ›Network data‹ → ›Co-occurrence network‹ → GEXF.
- Du kannst auch die URL kopieren.
- Dann kannst du die Datei zu Gephi Lite hochladen.
