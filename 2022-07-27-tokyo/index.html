### Our approach

<br />

- What we do: analysis of finite verbs in Immanuel Kant’s critical writings.
- Motivation: learn more about the semantic role of verbs in philosophical texts. Philosophy is articulated not only through nouns.
- Method: compare verb usage across philosophical subdisciplines (theoretical philosophy, practical philosophy, aesthetics).

--

### The Subcorpora

<br />

| Assembled Subcorpora   | Works                                                                                                                             | N&nbsp;tokens |
|------------------------|-----------------------------------------------------------------------------------------------------------------------------------|---------------|
| Theoretical Philosophy | • *Prolegomena to Any Future Metaphysics* <br />• *Metaphysical Foundations of Natural Science* <br />• *Critique of Pure Reason* |       311,137 |
| Practical Philosophy   | • *Foundations of the Metaphysics of Morals* <br />• *Critique of Practical Reason*<br />• *Metaphysics of Morals*                |       206,471 |
| Aesthetics/Teleology   | • *Critique of Judgment*                                                                                                          |       127,939 |

Tab. 1. Size of subcorpora and contained works. Full texts obtained from [Zeno.org](http://www.zeno.org/nid/20009187871).
<!-- .element: style="font-size:0.65em; margin-top:2.5em;" -->

--

### Methods

<br />

- POS tagging.
- Key verbs in subcorpus, using complete corpus as reference corpus.
- Keyness measure: log-likelihood.

--

### Results

<br />

- In **theoretical philosophy**, high keyness values for verbs associated with theory of knowledge (<span lang="de">“geben”, “anschauen”</span>) and natural philosophy (<span lang="de">“bewegen”, “anfangen”, “verändern”</span>).
- **Practical philosophy**: verbs from the sphere of law (<span lang="de">“erwerben”, “verpflichten”</span>).
- **Aesthetics**: activities (<span lang="de">“urteilen”, “beurteilen”</span>), aesthetic responses (<span lang="de">“gefallen”</span>).

--

### Conclusion

<br />

Differences in verb usage across philosophical subdisciplines <br />indicate that verbs make a non-negligible contribution to <br />the semantics of philosophical texts. At least in Kant.
