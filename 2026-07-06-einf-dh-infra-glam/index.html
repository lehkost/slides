### Anwendungsfall: Romanumfänge

<br />

- Erforschung des Einflusses von Textlängen auf Rezeptions-, Interpretations- und Kanonisierungsprozesse

### Was können Forschungsinfrastrukturen leisten?

<br />

- Investitionen (auf nationaler und internationaler Ebene) in gemeinsame Forschungskapazitäten, die über das hinausgehen, was einzelne Einrichtungen (oder gar ein Land) unterstützen können
- drastische Erhöhung der wissenschaftlichen Reichweite
- langfristige Forschungsfragen angehen, die gebündelte Anstrengungen erfordern
- Förderung von Zusammenarbeit, Interdisziplinarität, aber auch der Interaktion mit der Industrie

<br /><br />

Vorgetragen von John Womersley auf der [ICRI 2018](https://web.archive.org/web/20180629012706/http://www.icri2018.at/) in Wien, 12. September 2018, Übersetzung von mir.
<!-- .element: style="font-size:0.65em;" -->

### Die Rolle der DH-Zentren und -Netzwerke

<br />

- »Nicht zuletzt die Digital Humanities haben entscheidend dazu beigetragen, dass wir inzwischen wieder eine einheitlichere Sicht auf ›die Geisteswissenschaften‹ haben.« (Patrick Sahle, [DHdBlog, 18.03.2018](https://dhd-blog.org/?p=9547))
- Übersetzungsleistung, Ansprechpartner, Integrator, Schlüsselrolle bei Projektfinanzierungen
- nicht vorderhand an die *Digital* Humanities denken, sondern generell an die *Humanities*
- Infrastruktur muss finanziert werden: ein DH-Netzwerk oder -Zentrum ist *kein* Projekt

## Nationale Strukturen

--

### Nationale Forschungsdateninfrastruktur (NFDI)

<br />

»Die Nationale Forschungsdateninfrastruktur (NFDI) hat das Ziel, Daten von Wissenschaft und Forschung zur Verfügung zu stellen, zu vernetzen und somit langfristig nutzbar zu machen. An NFDI wirken Einrichtungen aus diversen Forschungsbereichen mit. Sie arbeiten an Services, Trainingsangeboten für Forschende und Standards für den Umgang mit Daten.« ([Wikipedia](https://de.wikipedia.org/w/index.php?title=Nationale_Forschungsdateninfrastruktur&oldid=266180268))
<!-- .element: style="text-align:left;" -->

--

### NFDI: Zahlen und Förderung

<br />

- gegründet 2020 als eingetragener Verein (NFDI e.V.), Sitz Karlsruhe
- Bund-Länder-Finanzierung: bis zu €90 Mio. pro Jahr bis 2028 <br />(90% Bund, 10% Länder)
- drei Förderrunden: 2020 (9 Konsortien) → 2021 (+10) → 2023 (+8)
- aktuell: 26 geförderte Konsortien + Base4NFDI (Verbund für gemeinsame Basisdienste)

<br /><br />

(Quellen: [nfdi.de/verein/](https://www.nfdi.de/verein/), [nfdi.de/konsortien/](https://www.nfdi.de/konsortien/))
<!-- .element: style="font-size:0.65em;" -->

--

### Vier NFDIs für die <br />Geisteswissenschaften

<br />

- **NFDI4Culture**: materielle & immaterielle Kulturgüter (GLAM!)
- **NFDI4Objects**: materielle Hinterlassenschaften der Menschheitsgeschichte (Archäologie, Vor-/Frühgeschichte)
- **NFDI4Memory**: historisch arbeitende Geisteswissenschaften
- **Text+**: Sprach- und textbasierte Forschungsdateninfrastruktur

--

![Text+-Logo](images/Textplus_logo_RGB.svg)<!-- .element: style="width:240px;" -->

- [Text+](https://text-plus.org/) betreibt u. a. eine Registry für Sprach- und Textressourcen sowie das TextGrid-Repository
- Anknüpfungspunkte für geisteswissenschaftliche Korpusinfrastrukturen
  - Metadatenstandards (TEI, [CMDI](https://textplus.hypotheses.org/15401))
  - persistente Identifikatoren, Normdaten-Verknüpfung über die [GND-Agentur Text+](https://text-plus.org/themen-dokumentation/standardisierung/gnd-agentur/)
  - Ziel: Auffindbarkeit, Interoperabilität, Nachnutzbarkeit (FAIR-Prinzipien)

--

<!-- .slide: class="list08" -->

![NFDI4Culture-Logo](images/NFDI4Culture_Logo.png)<!-- .element: style="width:420px;" -->

- [nfdi4culture.de](https://nfdi4culture.de/): Forschungsdaten aus Musik, audiovisuellem Erbe, Bau- und Kunstgeschichte, Archäologie u.v.m.
- Anknüpfungspunkte für Kulturerbe-Infrastrukturen allgemein
  - [Culture Data Search](https://nfdi4culture.de/services/details/culture-data-search.html): zentraler Zugang zu multimodalen Datensets aus den NFDI4Culture-Forschungsfeldern
  - [FAIR Check](https://nfdi4culture.de/de/dienste/details/fair-check.html): Qualitätsprüfung eigener Forschungsdaten
  - Standards & Quality Assurance sowie Ontologies & Terminologies als eigene Serviceangebote
- eingebunden sind Universitäten, Kunst- und Musikhochschulen, Museen, Archive, Bibliotheken und Einzelforschende

--

### Wie wird man Teil der NFDI?

<br />

- Community-Calls und Task Forces der einzelnen Konsortien
- Trainingsangebote: NFDI4Culture Academy, DARIAH-Campus, [NFDI-Sections-Roadshows](https://www.nfdi.de/sections-roadshow/)
- studentische/wissenschaftliche Hilfskraftstellen in Konsortien
- Berufsbilder: Data Steward, RDM-Spezialist\*in, Research Software Engineer

### DARIAH leistet vier Dinge

<br />

* Education and Training
  * complement traditional training with corresponding material and alternative teaching methods (workshops, summer schools, hackathons, etc.)<!-- .element: style="font-size:0.8em;" -->
* Foresight and Policy Work
  * making the voice of the A+H heard in research policy discussions, promote nascent policies to our communities<!-- .element: style="font-size:0.8em;" -->
* Working Groups
  * see next slide<!-- .element: style="font-size:0.8em;" -->
* Social Sciences & Humanities Open Marketplace
  * enable access to research solutions (tools, services, data, workflows, know-how), also aiming at researchers who don’t regard themselves as<!-- .element: style="font-size:0.8em;" --> *digital* humanists

### European Open Science Cloud (EOSC)

<br />

- föderiertes, europaweites Ökosystem für Forschungsdaten aus allen Disziplinen
- kein zentraler Datenspeicher, sondern ein Verbund bestehender Infrastrukturen
- Ziel: Forschungsdaten, -software und -werkzeuge grenz- und fachübergreifend auffindbar, zugänglich und nachnutzbar machen
- Governance: dreiseitig zwischen Europäischer Kommission, EOSC Steering Board (Mitgliedsstaaten) und EOSC Association (seit 2020, Forschungscommunity)
- Meilensteine: EOSC-Erklärung (2017) → EOSC Governance (2018) → EOSC Association (2020) → EOSC EU Node (2024, erstes Produktivsystem von EOSC)
- Stichwörter: Datenkultur, Open Access, FAIR-Prinzipien, Standards, Datenmanagementpläne, technische Implementierungen, rechtliche Aspekte

<br />(Quellen: [eosc.eu](https://eosc.eu/), [open-science-cloud.ec.europa.eu](https://open-science-cloud.ec.europa.eu/), [digital-strategy.ec.europa.eu/en/policies/open-science-cloud](https://digital-strategy.ec.europa.eu/en/policies/open-science-cloud))
