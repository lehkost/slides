### Was sind Daten? (2/2)

<br />

- Beispiele: Temperatur, Geschwindigkeit eines Fahr- oder Flugzeugs, Umfragen, Kriminalitätsraten, Arbeitslosenquoten, ...
- Daten werden von Organisationen, Institutionen, Unternehmen und Regierungen erhoben und gesammelt
- Daten in den Geisteswissenschaften: Bücher oder Korpora, Zeitungsarchive, Dateien, Listen, Bilder, ...
- Rohdaten/Primärdaten: unverfälscht, unsortiert, unkategorisiert – müssen aufbereitet werden

### Daten in den Geisteswissenschaften

<br />

- »eine digitale, selektiv erzeugte, maschinell verarbeitbare Abstraktion, die ausgesuchte Facetten eines bestimmten geisteswissenschaftlichen Untersuchungsgegenstands darstellt« ([Schöch 2013](http://journalofdigitalhumanities.org/2-3/big-smart-clean-messy-data-in-the-humanities/))
- Big Data vs. Smart Data

--

### Big Data

<br />

- 3V-Paradigma:
  - Volumen (Menge der Daten)
  - Velocity (Geschwindigkeit der Daten, Ein-/Ausgabe, Echtzeit)
  - Variety (Vielfalt: Text, Bilder, Audio, Video)
- »ungeordnet und implizit, relativ große Menge und vielfältige Form« (Schöch 2013)

--

### Big Data in Action

<br />

- Google Ngram Viewer: https://books.google.com/ngrams
- veröffentlicht 2010
- Erez Aiden, Jean-Baptiste Michel: *Uncharted: Big Data as a Lens on Human Culture*. Riverhead Books 2013.

--

### Smart Data

<br />

- enthält normalerweise Markup, Annotationen, Metadaten
- verlangt händischen Eingriff und kostet Zeit
- »strukturiert oder teilstrukturiert, sauber und explizit, relativ geringer Umfang und begrenzte Heterogenität« (Schöch 2013)

### Data oder Capta?

<br />

- in vielen Visualisierungen erscheinen Daten als objektiv, neutral und einfach »gegeben«
- Johanna Druckers Gegenbegriff: nicht *data*, sondern *capta*, also etwas, das aktiv genommen, ausgewählt und modelliert wird
- geisteswissenschaftliche Daten sind daher nie roh: Kategorien wie Zeit, Raum, Text, Ereignis, Gattung oder Geschlecht beruhen auf Interpretationen, Perspektiven und historischen Kontexten
- Balken, Karten und Zeitachsen tun oft so, als seien ihre Kategorien stabil, eindeutig und beobachterunabhängig
- Konsequenz: Visualisierungen sollten Ambiguität, Unsicherheit, Kontext und Perspektivität sichtbar machen, nicht nur scheinbare Eindeutigkeit

<br />Johanna Drucker: Humanities Approaches to Graphical Display. In: Digital Humanities Quarterly (DHQ). Vol. 5 (2001), Nr. 1. ([doi:10.63744/r4ysrh7ae534](https://doi.org/10.63744/r4ysrh7ae534))

### Was ist ein Jupyter Book?

<br />

- besteht aus einer Sammlung von Jupyter Notebooks und erzeugt daraus ein strukturiertes, navigierbares Buch als statische Website
- Notebooks im Buch können ausführbaren Code enthalten, Leser\*innen können Codeblöcke direkt über Binder oder Google Colab interaktiv ausführen
- unterstützt u.&nbsp;a. Zitationen, nummerierte Abbildungen, Marginalien, Selbsttests
- ermöglicht interaktive, reproduzierbare Publikationen im wissenschaftlichen Umfeld
