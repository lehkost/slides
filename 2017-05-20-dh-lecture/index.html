## The Wikimedia Family

<br />
- Wikipedia
- Wikisource (Викитека)
- Wikivoyage (Викигид)
- Wiktionary (Викисловарь)
- Wikiquote (Викицитатник)
- Wikinews (Викиновости)
- …

--

![Wikipedia logo](images/WikipediaLogo.png)<!-- .element: style="height:200px;" -->

- at the moment, there are 296 language versions of which 285 are active ([List of Wikipedias](https://en.wikipedia.org/wiki/List_of_Wikipedias))
- compare sizes
  - how do you explain the high numbers of articles in Waray and in the Cebuano language?

<br /><br /><br /><br />
<!-- .element: style="font-size:0.5em;" -->([Wikipedia logo source](https://commons.wikimedia.org/wiki/File:Wikipedia-logo-v2.svg))

--

![MediaWiki logo](images/MediaWikiLogo.png)<!-- .element: style="height:200px;" -->

- MediaWiki: free and open-source Wiki software, can be downloaded and run on own servers
- there is other Wiki software, like DokuWiki or TWiki ([overview](https://en.wikipedia.org/wiki/Comparison_of_wiki_software))
- Wikipedia started on January 15, 2001, and runs on MediaWiki since January, 2002
- current version is 1.28.2 ([mediawiki.org](https://www.mediawiki.org/))

<br /><br />
<!-- .element: style="font-size:0.5em;" -->([MediaWiki logo source](https://commons.wikimedia.org/wiki/File:MediaWiki_logo_without_tagline.png))

--

### An Article May Contain …

<br />
- Geodata
- Images, Sound and Movie Files
- Footnotes
- Bibliographic data
- Authority Files
- Categories
- …

<br />
→ analysing the structure of a sample article: [Иркутск](https://ru.wikipedia.org/wiki/Иркутск)

--

![Wikimedia Commons logo](images/WikimediaCommonsLogo.png)<!-- .element: style="height:200px;" -->

- "online repository of free-use images, sound, and other media files" (Wikipedia)
- maintenance of media content was separated from Wikipedia content
- one advantage: the same media file can be used in several Wikis/Wikipedias

<br /><br />
<!-- .element: style="font-size:0.5em;" -->([Wikimedia Commons logo source](https://commons.wikimedia.org/wiki/File:Commons-logo-en.svg))
