## 2. Bärmann and his drama automaton

--

### Georg Nikolaus Bärmann (1785–1850)

![Portrait of Bärmann](images/baermann-konterfei-wikimedia-commons.jpg)<!-- .element: style="width:400px;" -->

(image source: [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:PPN663960886_G._N._B%C3%A4rmann,_Dr._(1835).jpg))
<!-- .element: style="font-size:0.65em;" -->

--

![Cover Würfel-Almanach](images/almanach-cover.png)<!-- .element: style="width:340px;" -->

Its title – “Nine hundred and ninety-nine plus several more almanac comedies <br />by throwing dice” – promises enough one-act plays for 133 years.
<!-- .element: style="font-size:0.7em;" -->

--

### Target of ridicule 🎯

<br />

- Bärmann’s Almanac = parody of a long-term project by August von Kotzebue, the infamous “Almanac of Dramatic Plays Designed for the Social Entertainment in the Countryside”, founded in 1803, which featured one-act plays for amateur theatres
- High demand for one-act plays, but also strong criticism of their simplistic plots

--

### Structure of Bärmann’s Almanac

![example page of the Almanach](images/beispielseite-almanach.jpg)<!-- .element: style="width:600px;" -->

Page 4, snippets 5 to 7 (out of 1,200 snippets in total).
<!-- .element: style="font-size:0.9em;" -->

--

### Rules of play

<br />

- To generate a play, you must roll the dice 200 times
- The dice-roll table shows which snippets are to be inserted next

## 3. Workflow

--

How do you digitise a book that’s also a game?

<br />

(It’s not just an edition of a printed original.)

--

### Goal

![Mockup 2](images/mockup-2.png)<!-- .element: style="height:250px;" -->
![Mockup 1](images/mockup-1.png)<!-- .element: style="height:250px;" -->

- Recreating the game in an interactive web app
- Reverse engineering: restoring Bärmann’s aleatoric project to its original order

--

### Gameplay

<br />

- Functionality based on the original
- Implementation of a dice-roll mechanism for creating individual plays
- In addition to the gameplay, other analysis options are also available

--

### Textual basis

<br />

- Digital copy of “Neunhundert neun und neunzig und noch etliche Almanachs-Lustspiele durch den Würfel” [on Google Books](https://books.google.com/books?id=5phlNmAMBt8C&printsec=frontcover)

--

### Optical Character Recognition (OCR)

<br />

- Transkribus
- Model: [›German Fraktur 18th Century – WrDiarium_M9‹](https://readcoop.eu/de/modelle/german-fraktur-18th-century/)

--

### OCR correction

<br />

- Started a project [in Wikisource](https://w.wiki/Aj99)
- Correction following the four-eye principle &nbsp;👀&nbsp;👀

--

### TEI conversion

<br />

- Semantic encoding of speakers, speech acts, scene headings, stage directions, etc.
- Well-formed XML document, but *slightly* invalid TEI

<br />![almost TEI valid](images/almost-tei-valid.png)<!-- .element: style="width:560px;" -->

--

### Dice-roll table

<br />

- Digitisation as CSV table with six columns and 200 rows each

--

### Web app

<br />

- Developed in TypeScript using SvelteKit (component-based web framework)
- Transformed the TEI XML into an HTML representation of robust XSLTProcessor interface and a custom XSL stylesheet
- Converted the dice-roll table to JSON array with arrays of the form 200 × 6 (for 200 rolls of a six-sided dice)
- Serves as lookup table to identify the segment IDs equipped with ```xml:id``` on the corresponding ```<div>``` elements

## 4. Analysis

--

### 999+ plays for 133 years?

<br />

- The author’s claim regarding the number of individual one-act plays that can be rolled is a radical understatement
- Purely mathematically, 6<sup>200</sup> possible combinations of the individual text snippets are possible
- Corresponds to approximately 4 × 10<sup>155</sup>, which is more one-act plays than there are atoms in the universe (assuming approximately 10<sup>82</sup> atoms, cf. [Baker 2021](https://www.livescience.com/how-many-atoms-in-universe.html))

--

### Nature of the text variances

<br />

- All generated plays follow a marriage-with-obstacle plot
- 125th roll as an example: the Lover’s argument for supporting his future wife is slightly different in each of the 6 cases, but the over-all plot changes only in detail
- However, the variants vary in length, with the shortest possible version at 2,905 words being only half as long as the longest possible version at 6,250 words (or measured in characters: 14,178 vs. 30,943)

--

### Function of the Dice-Roll Almanac

<br />

- Reproduces precisely the monotony that Bärmann criticised
- Important function of almanacs and one-act plays: “radical democratisation” of theatre (cf. Çakir 2024, p. 223)
- Playful aspect of writing one-act plays, simplified by the dice

--

### Facilitating accessibility: <br />English translation added

<br />

- Targeted “good-enough” quality despite hard-to-convey 1820s humor &amp; untranslatable puns
- 1,200 snippets processed in 30 ChatGPT-4o runs (40 per batch)
- Detailed prompts ensured historical-poetic tone &amp; faithful style
- Strict rules: preserve formatting, no omissions or paraphrases
- Quality control: checklist re-reads &amp; side-by-side comparison for consistency
- Resulting English translation also converted to TEI

--

### Generated plays can be shared and <br />are downloadable in TEI‼️

<br />

- The Share button enables stable referencing of a generated version of a play
- To facilitate further research, we also added a download function
- Each generated play can be downloaded in TEI format
- File name uses timestamp, the individual 200-digit IDs are stored in the file

---

## 5. Summary

<br />

- Fragmentation of Bärmann’s Dice-Roll Almanac poses a challenge for its digitisation
- Our app makes the individual experience reproducible and opens up new angles for research
