### »Computational thinking« bei Boris Jarcho (Yarkho)

<br />

- Aufsatz »Speech Distribution in Five-Act Tragedies (A Question of Classicism and Romanticism)«, [doi:10.1515/jlt-2019-0002](https://doi.org/10.1515/jlt-2019-0002)
- »Eine große Unannehmlichkeit der von uns vorgeschlagenen komparativ-statistischen Methode ist die Unwahrscheinlichkeit, dass eine Person jemals in der Lage wäre, eine ausreichende Anzahl von Merkmalen der Klassik und der Romantik zu studieren, wenn sie dies nicht zu ihrem gesamten Lebenswerk machen will.«
- »Die Berechnung [eines bestimmten Koeffizienten] würde jedoch über 150 Berechnungen von Standardabweichungen erfordern. Da wir dafür nicht die entsprechenden Mitarbeiter zur Verfügung hatten, hätten wir damit mehr Zeit verloren, als es wert gewesen wäre.«
- »Wir haben die Technik demonstriert; der Weg ist frei für diejenigen, die mehr Glück haben als wir.«

* Nils Reiter, Tim Strohmayer, Janis Pagel: [DramaAnalysis](https://cran.r-project.org/web/packages/DramaAnalysis/index.html) (2019)

# Kapitel 2.

### Korpusarbeit

--

### **DraCor**

<br />

- nachhaltige Forschungsprojekte benötigen (und erzeugen) dedizierte Infrastruktur
- DraCor: *Drama Corpora*-Portal (https://dracor.org/)
- [Credits](https://dracor.org/doc/credits)-Seite: &gt; 50 Namen
- Beginn mit zwei Hauskorpora:
  - German Drama Corpus, GerDraCor (1730er–1940er)
  - Russian Drama Corpus, RusDraCor (1740er–1940er)

--

### Voraussetzung: Kodierungsstandard TEI

<br />

```xml
<sp who="#gretchen">
  <speaker>MARGARETE.</speaker>
  <lg>
    <l>Nun sag, wie hast du’s mit der Religion?</l>
    <l>Du bist ein herzlich guter Mann,</l>
    <l>Allein ich glaub’, du hältst nicht viel davon.</l>
  </lg>
</sp>
<sp who="#faust">
  <speaker>FAUST.</speaker>
  <lg>
    <l>Laß das, mein Kind! Du fühlst, ich bin dir gut;</l>
    <l>Für meine Lieben ließ’ ich Leib und Blut,</l>
    <l>Will niemand sein Gefühl und seine Kirche rauben.</l>
  </lg>
</sp>
```

<br />

<small>Dialog aus Goethes »Faust I« (1808) in TEI (Text Encoding Initiative). Momentan <br />sind im Standard 582 verschiedene Elemente definiert ([Stand August 2020](https://tei-c.org/release/doc/tei-p5-doc/en/html/REF-ELEMENTS.html)).</small>

### Was ist eine API?

<br />

- standardisierter Austausch von Informationen zwischen einer Anwendung und einzelnen Programmteilen
- modularisierte, vereinfachte Programmierung
- Übergabe von Daten erfolgt strukturiert nach einer definierten Syntax
- speziell: REST API (für Webservices)

library(data.table)

```

## DraCor als Teil eines Ecosystems

--

### Konzept der ›Programmable Corpora‹

<br />

<small>Publikation: <br />Frank Fischer et al.: **Programmable Corpora: Introducing DraCor, an Infrastructure for the Research on <br />European Drama.** Proceedings of DH2019: »Complexities«, Utrecht, [doi:10.5281/zenodo.4284002](https://doi.org/10.5281/zenodo.4284002).</small>

<br />

- Korpora als vergleichbare Objekte, die selbst Funktionen anbieten und mit anderen Datenquellen verbunden sind (via LOD)
- [FAIR-Prinzipien](https://www.go-fair.org/fair-principles/)
- Programmable Corpora erschöpfen sich aber nicht in der angebotenen API, Andockbarkeit auf allen Ebenen gegeben (TEI, API, R, Python, LOD, …)

### Zusammenfassung

<br />

- DraCor: eine digitale Forschungsinfrastruktur zum europäischen Drama
- verlässliche, erweiterbare Korpora in mehreren Sprachen, gepaart mit hochfunktionalen Schnittstellen (→&nbsp;komparatistische Ansätze)
- DraCor als Teil eines digitalen Ökosystems zur internationalen Dramenforschung
- Open Data, Open Source, Community
- (Weiter-)Entwicklung in kritischer Auseinandersetzung mit digitalen Forschungsmöglichkeiten
- Schnittstelle zwischen analoger und digitaler Philologie
