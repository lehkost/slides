# Chapter 1

<br />

## TEI Corpus Work

--

## How &nbsp;**DraCor**&nbsp; Came About

<br />

- sustainable research projects require (and generate) infrastructure
- DraCor: Drama Corpora Platform ([dracor.org](https://dracor.org/))
- two in-house corpora:
  - German Drama Corpus, GerDraCor (1730s–1930s)
  - Russian Drama Corpus, RusDraCor (1740s–1940s)

--

## Frontend dracor.org

![DraCor frontpage](images/dracor-frontpage.png)<!-- .element: style="width:840px;" -->

[dracor.org](https://dracor.org/) (public beta!)
<!-- .element: style="font-size:0.65em;" -->

--

## GerDraCor + RusDraCor

<br />

- TEI-P5
- added `<particDesc>` to assemble all speakers, even functional or ephemeral characters not featured in cast lists
- added Wikidata IDs for authors and plays (connecting DraCor to the LOD cloud)

--

## ShakeDraCor

<br />

- derived from [Shakespeare Folger Library](https://www.folgerdigitaltexts.org/)
- simple XQuery script to adapt the corpus to the platform
- example: [“Hamlet”](https://dracor.org/shake/hamlet)

--

## SpanDraCor

<br />

- “Biblioteca Electrónica Textual del Teatro en Español de 1868–1936” (BETTE)
- 25 plays by 8 authors
- forked from their [GitHub repo](https://github.com/HDAUNIR/BETTE), minimal adaptations to connect to DraCor
- example: Valle Inclán’s [“Águila de blasón”](https://dracor.org/span/valle-aguila)

--

## GreekDraCor + RomDraCor

<br />

- derived from [Perseus Digital Library](http://www.perseus.tufts.edu/hopper/)
- 39 plays of Greek antiquity downloaded from [their website](http://www.perseus.tufts.edu/hopper/opensource/download) (licensed under CC BY-SA 3.0)
- 36 Roman plays (Plautus, Seneca, Terence)
- convert Betacode to Unicode (using Python package [betacode 0.2](https://pypi.org/project/betacode/))
- example: Aristophanes’s [“Frogs”](https://dracor.org/greek/aristophanes-frogs)

--

## Coming Soon

<br />

- IbsDraCor
- HolDraCor (derived from the digital edition of [*Ludvig Holbergs skrifter*](http://holbergsskrifter.dk/holberg-public/view?docId=adm/HolbergsWritings.xml&sort=category))
- SweDraCor (derived from [*Dramawebben*](https://litteraturbanken.se/dramawebben))
- BashDraCor
- ItaDraCor (derived from the [*Letteratura teatrale nella Biblioteca italiana*](http://www.bibliotecaitaliana.it/))

## DraCor API (1/2)

<br />

- provides metadata, bespoke excerpts of the actual text (stage directions, spoken text per character, etc.) and various metrics
- e.g., network data for all plays in CSV and GEXF format
- SPARQL endpoint
- live documentation via Swagger: [dracor.org/doc/api](https://dracor.org/doc/api)

## Simple Use Case
#### Number of characters per play in chronological order (1/3)

<br />

```R
library(data.table)
library(ggplot2)
rusdracor <- fread("https://dracor.org/api/v1/corpora/rus/metadata/csv")
ggplot(rusdracor[], aes(x = year, y = numOfSpeakers)) + geom_point()
```

<br />

Very simple R script.

# Chapter 3

## Programmable Corpora

--

## The Concept

<br />

- analogy to the IT news platform *ProgrammableWeb* (slogan: “APIs, Mashups and the Web as Platform”)
- corpora as comparable objects that offer functions themselves and are linked to other data sources (via LOD)
- FAIR principles, better reproducibility
- you can connect to the platform at any level (TEI, API, R, Python, SPARQL, Excel, …)

--
