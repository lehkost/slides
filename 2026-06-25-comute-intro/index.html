### Lightning Talks · Line-Up

<br />

1. **Svenja Guhr**: 36% Gone: Alignment-Based Detection of Omission in Literary Translation
2. **Elena Bandt &amp; Aminata Kaba**: Early Modern Foreign Language Textbooks: Data, Challenges, and Prospects
3. **Elli Bleeker**: Updates from the Working Group [VIDIT](https://wg-vidit.github.io/): Visualising and Investigating Differences in Texts
4. **Manuela Bragagnolo &amp; Polina Solonets**: Digitally Exploring Historical Multilingual Practices: The Challenges of the [HyperAzpilcueta](https://www.lhlt.mpg.de/research-project/hyperazpilcueta) Project
5. **Brandon Hurst**: Herman Melville: Reader and Writer of Multilingual Texts
6. **Josef Peter Jeschke**: Murād Farag: Jerusalemite (Songs)
7. **Ingo Kieslich**: Hannah Arendt: Writing in Two Languages
8. **Henrike Schmidt**: Comparing Gender Representation in Newer German Language Translations of Charlotte Brontë’s *Jane Eyre*
9. **Bart Soethaert**: *Zorba the Greek* as a Fluid Text
10. **Marwa Ahmed**: AL Muhaqqiq Platform: Application in Multilingual Text Analysis and Digital Edition

### Lightning Talks · Rules

<br />

- You get **5 minutes**. We’ll wave a friendly one-minute warning so the ending doesn’t sneak up on you. You may say “just one more slide” exactly once. 😊
- Then **one or two quick questions**, **2 minutes** total. Enough to be curious, to be continued over coffee or across the workshop.
